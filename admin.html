<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Админ-консоль</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: #0a0c10;
            color: #fff;
            min-height: 100vh;
        }

        .glow-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
        }

        .sphere-1 { width: 600px; height: 600px; top: -200px; right: -200px; background: linear-gradient(135deg, #667eea, #764ba2); }
        .sphere-2 { width: 500px; height: 500px; bottom: -200px; left: -100px; background: linear-gradient(135deg, #ff6b6b, #ff8e53); }
        .sphere-3 { width: 400px; height: 400px; top: 50%; left: 30%; background: linear-gradient(135deg, #4facfe, #00f2fe); }

        .glass-card {
            background: rgba(20, 25, 35, 0.5);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 24px;
            padding: 20px 28px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #b0c4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            background: rgba(0, 0, 0, 0.4);
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 12px;
        }

        .status-badge.online {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-badge.offline {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 12px;
        }

        .tab-btn {
            padding: 10px 24px;
            background: transparent;
            border: none;
            border-radius: 40px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: rgba(108, 140, 255, 0.3);
            color: white;
        }

        .panel {
            display: none;
            background: rgba(20, 25, 35, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .panel.active {
            display: block;
        }

        .panel h2 {
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            color: #fff;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }

        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 13px;
        }

        th {
            font-weight: 600;
            opacity: 0.7;
        }

        .delete-btn, .add-points-btn, .remove-points-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 24px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            margin: 2px;
        }

        .delete-btn {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .add-points-btn {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .remove-points-btn {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .danger-zone {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 2px solid rgba(239, 68, 68, 0.3);
        }

        .danger-btn {
            background: rgba(239, 68, 68, 0.3);
            border: 1px solid rgba(239, 68, 68, 0.5);
            padding: 12px 20px;
            border-radius: 40px;
            color: #f87171;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .status-badge-small {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
        }

        .status-active {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .task-stats {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 2px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 1000;
            border-left: 4px solid #6c8cff;
            font-size: 13px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .header { padding: 16px 20px; flex-direction: column; text-align: center; }
            .panel { padding: 20px; }
            .tab-btn { padding: 8px 16px; font-size: 13px; }
            th, td { padding: 10px 8px; font-size: 11px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="glow-bg">
        <div class="glow-sphere sphere-1"></div>
        <div class="glow-sphere sphere-2"></div>
        <div class="glow-sphere sphere-3"></div>
    </div>

    <div class="container">
        <div class="glass-card header">
            <h1>🔧 Админ-консоль</h1>
            <div id="dbStatus" class="status-badge">⏳ Проверка...</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="tasks">📋 Задачи</button>
            <button class="tab-btn" data-tab="chiefs">👥 Шефы</button>
            <button class="tab-btn" data-tab="ratingMain">🏆 Рейтинг округов</button>
            <button class="tab-btn" data-tab="ratingPrimary">📊 Рейтинг первичек</button>
        </div>

        <div id="tasks-panel" class="panel active">
            <h2>📋 Управление задачами</h2>
            <input type="text" id="taskSearch" class="search-input" placeholder="Поиск...">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>ID</th><th>Задача</th><th>Описание</th><th>Статистика</th><th>Тип</th><th>Действия</th></tr>
                    </thead>
                    <tbody id="tasksTable"></tbody>
                </table>
            </div>
            <div class="danger-zone">
                <button class="danger-btn" onclick="deleteAllTasks()">⚠️ УДАЛИТЬ ВСЕ ЗАДАЧИ</button>
            </div>
        </div>

        <div id="chiefs-panel" class="panel">
            <h2>👥 Управление баллами</h2>
            <input type="text" id="chiefSearch" class="search-input" placeholder="Поиск...">
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>Шеф</th><th>Округ</th><th>Тип</th><th>Баллы</th><th>Действия</th></tr>
                    </thead>
                    <tbody id="chiefsTable"></tbody>
                </table>
            </div>
        </div>

        <div id="ratingMain-panel" class="panel">
            <h2>🏆 Рейтинг округов</h2>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Округ</th><th>Баллы</th><th>Шефов</th><th>Средний</th></tr></thead>
                    <tbody id="ratingMainTable"></tbody>
                </table>
            </div>
        </div>

        <div id="ratingPrimary-panel" class="panel">
            <h2>📊 Рейтинг первичек</h2>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>Округ</th><th>Баллы</th><th>Первичек</th><th>Средний</th></tr></thead>
                    <tbody id="ratingPrimaryTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://csvynjkhhlexbnwpziup.supabase.co';
        const SUPABASE_KEY = 'sb_publishable__WbXqBZhgBBU-dDFEvXVeA_PQYwa_y7';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allTemplates = [], allAssignments = [];

        async function checkConnection() {
            const { error } = await sb.from('districts').select('count', { count: 'exact', head: true });
            const div = document.getElementById('dbStatus');
            if (error) {
                div.innerHTML = '❌ Ошибка';
                div.className = 'status-badge offline';
            } else {
                div.innerHTML = '✅ Подключено';
                div.className = 'status-badge online';
            }
        }

        async function loadTasks() {
            const { data: templates } = await sb.from('task_templates').select('*').order('id');
            const { data: assignments } = await sb.from('assignments').select('template_id, status');
            allTemplates = templates || [];
            allAssignments = assignments || [];
            renderTasksTable();
        }

        function renderTasksTable() {
            const search = document.getElementById('taskSearch')?.value.toLowerCase() || '';
            const filtered = allTemplates.filter(t => t.title.toLowerCase().includes(search));
            const tbody = document.getElementById('tasksTable');
            if (!filtered.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Нет задач</td></tr>';
                return;
            }
            let html = '';
            for (let t of filtered) {
                const tasks = allAssignments.filter(a => a.template_id === t.id);
                const total = tasks.length, completed = tasks.filter(a => a.status === 'completed').length;
                html += `<tr>
                    <td>${t.id}</td>
                    <td><strong>${escapeHtml(t.title)}</strong></td>
                    <td>${escapeHtml(t.description || '-')}</td>
                    <td>Всего: ${total}<br>✅ Вып: ${completed}<br>⏳ Ожид: ${total-completed}</td>
                    <td><span class="status-badge-small status-active">${t.type === 'event' ? '🎉 Событие' : '📢 Распуш'}</span></td>
                    <td><button class="delete-btn" onclick="deleteTaskByTemplate(${t.id}, '${escapeHtml(t.title).replace(/'/g, "\\'")}')">🗑 Удалить у всех</button></td>
                </tr>`;
            }
            tbody.innerHTML = html;
        }

        window.deleteTaskByTemplate = async (id, title) => {
            if (!confirm(`Удалить все задачи "${title}"?`)) return;
            const { data: tasks } = await sb.from('assignments').select('id').eq('template_id', id);
            if (tasks?.length) {
                for (let t of tasks) await sb.from('operations_history').delete().eq('assignment_id', t.id);
                await sb.from('assignments').delete().eq('template_id', id);
            }
            loadTasks(); loadChiefs(); loadRatingMain(); loadRatingPrimary();
            showToast(`✅ Задачи "${title}" удалены`);
        };

        window.deleteAllTasks = async () => {
            if (!confirm('УДАЛИТЬ ВСЕ ЗАДАЧИ?')) return;
            await sb.from('operations_history').delete().neq('id', 0);
            await sb.from('assignments').delete().neq('id', 0);
            loadTasks(); loadChiefs(); loadRatingMain(); loadRatingPrimary();
            showToast('✅ Все задачи удалены');
        };

        async function loadChiefs() {
            const { data: chiefs } = await sb.from('chiefs').select('*, districts(name)').order('name');
            const { data: scores } = await sb.from('chief_scores').select('*');
            const scoreMap = {};
            if (scores) for (let s of scores) scoreMap[s.chief_id] = s.total_score || 0;
            const list = (chiefs || []).map(c => ({ ...c, score: scoreMap[c.id] || 0 }));
            const tbody = document.getElementById('chiefsTable');
            if (!list.length) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Нет шефов</td></tr>';
                return;
            }
            let html = '';
            for (let c of list) {
                html += `<tr>
                    <td>${escapeHtml(c.name || '-')}</td>
                    <td>${escapeHtml(c.districts?.name || '-')}</td>
                    <td><span class="status-badge-small status-active">${c.primary_branch_id ? '📌 Первичка' : '🏛️ Местное'}</span></td>
                    <td style="color:#6c8cff;">${c.score} баллов</td>
                    <td><button class="add-points-btn" onclick="addPoints('${c.id}')">+1</button><button class="remove-points-btn" onclick="removePoints('${c.id}')">-1</button></td>
                </tr>`;
            }
            tbody.innerHTML = html;
        }

        window.addPoints = async (id) => {
            const { data: cur } = await sb.from('chief_scores').select('total_score').eq('chief_id', id).single();
            const newScore = (cur?.total_score || 0) + 1;
            await sb.from('chief_scores').upsert({ chief_id: id, total_score: newScore, updated_at: new Date() });
            await sb.from('operations_history').insert([{ chief_id: id, action: 'Админ +1 балл' }]);
            const { data: chief } = await sb.from('chiefs').select('district_id').eq('id', id).single();
            if (chief) await updateDistrictScore(chief.district_id);
            loadChiefs(); loadRatingMain(); loadRatingPrimary();
            showToast('✅ +1 балл');
        };

        window.removePoints = async (id) => {
            const { data: cur } = await sb.from('chief_scores').select('total_score').eq('chief_id', id).single();
            const newScore = Math.max(0, (cur?.total_score || 0) - 1);
            await sb.from('chief_scores').upsert({ chief_id: id, total_score: newScore, updated_at: new Date() });
            await sb.from('operations_history').insert([{ chief_id: id, action: 'Админ -1 балл' }]);
            const { data: chief } = await sb.from('chiefs').select('district_id').eq('id', id).single();
            if (chief) await updateDistrictScore(chief.district_id);
            loadChiefs(); loadRatingMain(); loadRatingPrimary();
            showToast('⚠️ -1 балл');
        };

        async function updateDistrictScore(districtId) {
            const { data: chiefs } = await sb.from('chiefs').select('id').eq('district_id', districtId);
            let total = 0;
            for (let c of chiefs) {
                const { data: s } = await sb.from('chief_scores').select('total_score').eq('chief_id', c.id).single();
                total += s?.total_score || 0;
            }
            await sb.from('district_scores').upsert({ district_id: districtId, total_score: total, updated_at: new Date() });
        }

        async function loadRatingMain() {
            const { data } = await sb.from('district_scores').select('*, districts(name)').order('total_score', { ascending: false });
            const tbody = document.getElementById('ratingMainTable');
            if (!data?.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-state">Нет данных</td></tr>';
                return;
            }
            let html = '';
            for (let d of data) {
                const { count } = await sb.from('chiefs').select('*', { count: 'exact', head: true }).eq('district_id', d.district_id);
                html += `<tr><td>${escapeHtml(d.districts?.name || 'Неизвестно')}</td><td style="color:#6c8cff;">${d.total_score} баллов</td><td>${count || 0} шефов</td><td>${count > 0 ? Math.round(d.total_score / count) : 0} баллов</td></tr>`;
            }
            tbody.innerHTML = html;
        }

        async function loadRatingPrimary() {
            const { data: chiefs } = await sb.from('chiefs').select('id, district_id, districts(name), primary_branch_id');
            const { data: scores } = await sb.from('chief_scores').select('*');
            const scoreMap = {};
            if (scores) for (let s of scores) scoreMap[s.chief_id] = s.total_score || 0;
            const districts = {};
            for (let c of chiefs || []) {
                if (!c.primary_branch_id) continue;
                const name = c.districts?.name || 'Неизвестно';
                if (!districts[name]) districts[name] = { total: 0, count: 0 };
                districts[name].total += scoreMap[c.id] || 0;
                districts[name].count++;
            }
            const sorted = Object.entries(districts).map(([n, d]) => ({ name: n, total: d.total, count: d.count, avg: Math.round(d.total / d.count) })).sort((a,b) => b.total - a.total);
            const tbody = document.getElementById('ratingPrimaryTable');
            if (!sorted.length) {
                tbody.innerHTML = '<tr><td colspan="4" class="empty-state">Нет данных</td></tr>';
                return;
            }
            tbody.innerHTML = sorted.map(r => `<tr><td>${escapeHtml(r.name)}</td><td style="color:#6c8cff;">${r.total} баллов</td><td>${r.count} первичек</td><td>${r.avg} баллов</td></tr>`).join('');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                document.getElementById(btn.dataset.tab + '-panel').classList.add('active');
                if (btn.dataset.tab === 'tasks') loadTasks();
                if (btn.dataset.tab === 'chiefs') loadChiefs();
                if (btn.dataset.tab === 'ratingMain') loadRatingMain();
                if (btn.dataset.tab === 'ratingPrimary') loadRatingPrimary();
            };
        });

        document.getElementById('taskSearch')?.addEventListener('input', renderTasksTable);
        document.getElementById('chiefSearch')?.addEventListener('input', () => loadChiefs());

        checkConnection();
        loadTasks();
        loadChiefs();
        loadRatingMain();
        loadRatingPrimary();
    </script>
</body>
</html>
