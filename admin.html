<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Админ-консоль</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0c10;
            color: rgba(255, 255, 255, 0.95);
            min-height: 100vh;
        }

        .dark-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
        }

        .sphere-1 {
            width: 600px;
            height: 600px;
            top: -200px;
            right: -200px;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .sphere-2 {
            width: 500px;
            height: 500px;
            bottom: -200px;
            left: -100px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
        }

        .sphere-3 {
            width: 400px;
            height: 400px;
            top: 50%;
            left: 30%;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .glass-card {
            background: rgba(20, 25, 35, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .header {
            padding: 24px 32px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
        }

        .badge {
            background: rgba(239, 68, 68, 0.2);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
            color: #f87171;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .tab-btn {
            padding: 12px 28px;
            background: rgba(0, 0, 0, 0.4);
            border: none;
            border-radius: 60px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab-btn.active {
            background: rgba(108, 140, 255, 0.25);
            border: 1px solid rgba(108, 140, 255, 0.4);
            color: white;
        }

        .panel {
            background: rgba(20, 25, 35, 0.35);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 28px;
            display: none;
        }

        .panel.active {
            display: block;
        }

        .panel h2 {
            font-size: 22px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 28px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 24px;
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #b0c4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 14px;
        }

        th {
            font-weight: 600;
            opacity: 0.7;
        }

        .delete-btn, .add-points-btn, .remove-points-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            transition: all 0.2s;
            margin: 0 4px;
        }

        .delete-btn {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .delete-btn:hover {
            background: rgba(239, 68, 68, 0.4);
        }

        .add-points-btn {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .add-points-btn:hover {
            background: rgba(16, 185, 129, 0.4);
        }

        .remove-points-btn {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            color: white;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 500;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .status-completed {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 60px;
            z-index: 1000;
            border-left: 4px solid #6c8cff;
            font-size: 14px;
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            .header {
                padding: 18px 20px;
            }
            .panel {
                padding: 20px;
                overflow-x: auto;
            }
            th, td {
                padding: 10px 8px;
                font-size: 12px;
            }
            .toast {
                white-space: normal;
                max-width: 90%;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="dark-glow">
        <div class="glow-sphere sphere-1"></div>
        <div class="glow-sphere sphere-2"></div>
        <div class="glow-sphere sphere-3"></div>
    </div>

    <div class="container">
        <div class="header glass-card">
            <h1>Админ-консоль разработчика</h1>
            <div class="badge" id="dbStatus">Проверка подключения...</div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="tasks">Все задачи</button>
            <button class="tab-btn" data-tab="chiefs">Шефы</button>
            <button class="tab-btn" data-tab="rating">Рейтинг округов</button>
            <button class="tab-btn" data-tab="templates">Шаблоны</button>
        </div>

        <div id="tasks-panel" class="panel active">
            <h2>Управление задачами</h2>
            <input type="text" id="taskSearch" class="search-input" placeholder="Поиск по задаче, шефу, округу...">
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Задача</th>
                            <th>Шеф</th>
                            <th>Округ</th>
                            <th>Ссылка</th>
                            <th>Статус</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="tasksTable"></tbody>
                </table>
            </div>
        </div>

        <div id="chiefs-panel" class="panel">
            <h2>Управление баллами шефов</h2>
            <input type="text" id="chiefSearch" class="search-input" placeholder="Поиск по имени или округу...">
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Шеф</th>
                            <th>Округ</th>
                            <th>Тип</th>
                            <th>Баллы</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="chiefsTable"></tbody>
                </table>
            </div>
        </div>

        <div id="rating-panel" class="panel">
            <h2>Рейтинг по округам</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>Округ</th>
                            <th>Всего баллов</th>
                            <th>Количество шефов</th>
                            <th>Средний балл</th>
                        </tr>
                    </thead>
                    <tbody id="ratingTable"></tbody>
                </table>
            </div>
        </div>

        <div id="templates-panel" class="panel">
            <h2>Шаблоны задач</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Название</th>
                            <th>Описание</th>
                            <th>Активен</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="templatesTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://csvynjkhhlexbnwpziup.supabase.co';
        const SUPABASE_KEY = 'sb_publishable__WbXqBZhgBBU-dDFEvXVeA_PQYwa_y7';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allTasks = [];
        let allChiefs = [];

        async function checkConnection() {
            const { data, error } = await supabaseClient
                .from('districts')
                .select('count', { count: 'exact', head: true });
            
            if (error) {
                document.getElementById('dbStatus').innerHTML = 'Ошибка подключения';
                document.getElementById('dbStatus').style.background = 'rgba(239,68,68,0.2)';
                document.getElementById('dbStatus').style.color = '#f87171';
            } else {
                document.getElementById('dbStatus').innerHTML = 'База данных подключена';
                document.getElementById('dbStatus').style.background = 'rgba(16,185,129,0.2)';
                document.getElementById('dbStatus').style.color = '#10b981';
            }
        }

        async function loadAllTasks() {
            const { data, error } = await supabaseClient
                .from('assignments')
                .select('*, task_templates(title), chiefs(name, district_id), districts(name)')
                .order('created_at', { ascending: false });
            
            if (error) {
                console.error('Ошибка загрузки задач:', error);
                return;
            }
            allTasks = data || [];
            renderTasksTable();
        }

        function renderTasksTable() {
            const searchInput = document.getElementById('taskSearch');
            const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
            
            const filtered = allTasks.filter(function(t) {
                return (t.task_templates?.title || '').toLowerCase().includes(searchTerm) ||
                       (t.chiefs?.name || '').toLowerCase().includes(searchTerm) ||
                       (t.districts?.name || '').toLowerCase().includes(searchTerm);
            });
            
            const tbody = document.getElementById('tasksTable');
            if (!filtered || filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px;">Нет задач</td></tr>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < filtered.length; i++) {
                const task = filtered[i];
                html += '<tr>' +
                    '<td style="font-family: monospace; font-size: 11px;">' + (task.id || '') + '</td>' +
                    '<td>' + (task.task_templates?.title || '-') + '</td>' +
                    '<td>' + (task.chiefs?.name || '-') + '</td>' +
                    '<td>' + (task.districts?.name || '-') + '</td>' +
                    '<td>' + (task.link ? '<a href="' + task.link + '" target="_blank" style="color:#6c8cff;">Ссылка</a>' : '-') + '</td>' +
                    '<td><span class="status-badge status-' + (task.status || 'pending') + '">' + (task.status === 'pending' ? 'Ожидает' : 'Выполнено') + '</span></td>' +
                    '<td><button class="delete-btn" onclick="deleteTask(' + task.id + ')">Удалить</button></td>' +
                '</tr>';
            }
            tbody.innerHTML = html;
        }

        window.deleteTask = async function(taskId) {
            if (!confirm('Удалить задачу? Это действие нельзя отменить.')) return;
            
            await supabaseClient.from('assignments').delete().eq('id', taskId);
            await supabaseClient.from('operations_history').delete().eq('assignment_id', taskId);
            loadAllTasks();
            loadAllChiefs();
            loadRating();
            showToast('Задача удалена');
        };

        async function loadAllChiefs() {
            const { data, error } = await supabaseClient
                .from('chiefs')
                .select('*, districts(name)')
                .order('name');
            
            if (error) {
                console.error('Ошибка загрузки шефов:', error);
                return;
            }
            
            const { data: scores } = await supabaseClient.from('chief_scores').select('*');
            const scoreMap = {};
            if (scores) {
                for (let i = 0; i < scores.length; i++) {
                    scoreMap[scores[i].chief_id] = scores[i].total_score || 0;
                }
            }
            
            allChiefs = [];
            if (data) {
                for (let i = 0; i < data.length; i++) {
                    allChiefs.push({
                        id: data[i].id,
                        name: data[i].name,
                        district_id: data[i].district_id,
                        districts: data[i].districts,
                        primary_branch_id: data[i].primary_branch_id,
                        score: scoreMap[data[i].id] || 0
                    });
                }
            }
            renderChiefsTable();
        }

        function renderChiefsTable() {
            const searchInput = document.getElementById('chiefSearch');
            const searchTerm = searchInput ? searchInput.value.toLowerCase() : '';
            
            const filtered = allChiefs.filter(function(c) {
                return (c.name || '').toLowerCase().includes(searchTerm) ||
                       (c.districts?.name || '').toLowerCase().includes(searchTerm);
            });
            
            const tbody = document.getElementById('chiefsTable');
            if (!filtered || filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding:40px;">Нет шефов</td></tr>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < filtered.length; i++) {
                const chief = filtered[i];
                html += '<tr>' +
                    '<td style="font-family: monospace; font-size: 11px;">' + (chief.id || '') + '</td>' +
                    '<td>' + (chief.name || '-') + '</td>' +
                    '<td>' + (chief.districts?.name || '-') + '</td>' +
                    '<td>' + (chief.primary_branch_id ? 'Первичка' : 'Местное') + '</td>' +
                    '<td style="color: #6c8cff; font-weight: 600;">' + chief.score + ' баллов</td>' +
                    '<td>' +
                        '<button class="add-points-btn" onclick="addPoints(\'' + chief.id + '\')">+1</button>' +
                        '<button class="remove-points-btn" onclick="removePoints(\'' + chief.id + '\')">-1</button>' +
                    '</td>' +
                '</tr>';
            }
            tbody.innerHTML = html;
        }

        window.addPoints = async function(chiefId) {
            const chief = allChiefs.find(function(c) { return c.id === chiefId; });
            const currentScore = chief ? chief.score : 0;
            const newScore = currentScore + 1;
            await supabaseClient.from('chief_scores').upsert({ chief_id: chiefId, total_score: newScore, updated_at: new Date() });
            await supabaseClient.from('operations_history').insert([{ chief_id: chiefId, action: 'Админ начислил +1 балл' }]);
            loadAllChiefs();
            loadRating();
            showToast('Начислен 1 балл');
        };

        window.removePoints = async function(chiefId) {
            const chief = allChiefs.find(function(c) { return c.id === chiefId; });
            const currentScore = chief ? chief.score : 0;
            const newScore = Math.max(0, currentScore - 1);
            await supabaseClient.from('chief_scores').upsert({ chief_id: chiefId, total_score: newScore, updated_at: new Date() });
            await supabaseClient.from('operations_history').insert([{ chief_id: chiefId, action: 'Админ снял 1 балл' }]);
            loadAllChiefs();
            loadRating();
            showToast('Снят 1 балл');
        };

        async function loadRating() {
            const { data: chiefs } = await supabaseClient.from('chiefs').select('id, district_id, districts(name)');
            const { data: scores } = await supabaseClient.from('chief_scores').select('*');
            
            const districtScores = {};
            const districtCounts = {};
            
            if (chiefs) {
                for (let i = 0; i < chiefs.length; i++) {
                    const chief = chiefs[i];
                    const districtName = chief.districts?.name || 'Неизвестно';
                    const score = scores ? (scores.find(function(s) { return s.chief_id === chief.id; })?.total_score || 0) : 0;
                    
                    if (!districtScores[districtName]) {
                        districtScores[districtName] = 0;
                        districtCounts[districtName] = 0;
                    }
                    districtScores[districtName] += score;
                    districtCounts[districtName]++;
                }
            }
            
            const sorted = Object.keys(districtScores).map(function(name) {
                return {
                    name: name,
                    total: districtScores[name],
                    count: districtCounts[name],
                    avg: Math.round(districtScores[name] / districtCounts[name])
                };
            }).sort(function(a, b) {
                return b.total - a.total;
            });
            
            const tbody = document.getElementById('ratingTable');
            if (!sorted || sorted.length === 0) {
                tbody.innerHTML = '<table><td colspan="4" style="text-align:center; padding:40px;">Нет данных</td> </tr>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < sorted.length; i++) {
                const r = sorted[i];
                html += '<tr>' +
                    '<td style="font-weight: 600;">' + r.name + '</td>' +
                    '<td style="color: #6c8cff; font-weight: 600;">' + r.total + ' баллов</td>' +
                    '<td>' + r.count + ' шефов</td>' +
                    '<td>' + r.avg + ' баллов</td>' +
                '</tr>';
            }
            tbody.innerHTML = html;
        }

        async function loadTemplates() {
            const { data, error } = await supabaseClient.from('task_templates').select('*').order('id');
            if (error) return;
            
            const tbody = document.getElementById('templatesTable');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px;">Нет шаблонов</td> </tr>';
                return;
            }
            
            let html = '';
            for (let i = 0; i < data.length; i++) {
                const t = data[i];
                html += '<tr>' +
                    '<td>' + t.id + '</td>' +
                    '<td><strong>' + t.title + '</strong></td>' +
                    '<td>' + (t.description || '-') + '</td>' +
                    '<td><span class="status-badge" style="background: ' + (t.is_active ? 'rgba(16,185,129,0.2)' : 'rgba(239,68,68,0.2)') + '; color: ' + (t.is_active ? '#10b981' : '#f87171') + ';">' + (t.is_active ? 'Активен' : 'Неактивен') + '</span></td>' +
                    '<td><button class="delete-btn" onclick="toggleTemplate(' + t.id + ', ' + !t.is_active + ')">' + (t.is_active ? 'Отключить' : 'Включить') + '</button></td>' +
                '</tr>';
            }
            tbody.innerHTML = html;
        }

        window.toggleTemplate = async function(id, newStatus) {
            await supabaseClient.from('task_templates').update({ is_active: newStatus }).eq('id', id);
            loadTemplates();
            showToast('Шаблон обновлён');
        };

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(function() { toast.remove(); }, 2500);
        }

        // Вкладки
        const tabBtns = document.querySelectorAll('.tab-btn');
        for (let i = 0; i < tabBtns.length; i++) {
            tabBtns[i].addEventListener('click', function() {
                for (let j = 0; j < tabBtns.length; j++) {
                    tabBtns[j].classList.remove('active');
                }
                this.classList.add('active');
                
                const panels = document.querySelectorAll('.panel');
                for (let j = 0; j < panels.length; j++) {
                    panels[j].classList.remove('active');
                }
                document.getElementById(this.dataset.tab + '-panel').classList.add('active');
                
                if (this.dataset.tab === 'tasks') loadAllTasks();
                if (this.dataset.tab === 'chiefs') loadAllChiefs();
                if (this.dataset.tab === 'rating') loadRating();
                if (this.dataset.tab === 'templates') loadTemplates();
            });
        }

        const taskSearch = document.getElementById('taskSearch');
        if (taskSearch) {
            taskSearch.addEventListener('input', renderTasksTable);
        }
        
        const chiefSearch = document.getElementById('chiefSearch');
        if (chiefSearch) {
            chiefSearch.addEventListener('input', renderChiefsTable);
        }

        checkConnection();
        loadAllTasks();
        loadAllChiefs();
        loadRating();
        loadTemplates();
        
        setInterval(function() {
            const activeTab = document.querySelector('.tab-btn.active');
            if (activeTab) {
                if (activeTab.dataset.tab === 'tasks') loadAllTasks();
                if (activeTab.dataset.tab === 'chiefs') loadAllChiefs();
                if (activeTab.dataset.tab === 'rating') loadRating();
            }
        }, 15000);
    </script>
</body>
</html>
