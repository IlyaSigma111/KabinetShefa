<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Медиакоординатор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Helvetica, Arial, sans-serif;
            background: #0a0c10;
            color: #fff;
            min-height: 100vh;
        }

        .glow-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
        }
        .glow-1 { width: 500px; height: 500px; top: -200px; right: -200px; background: #667eea; }
        .glow-2 { width: 400px; height: 400px; bottom: -150px; left: -150px; background: #a855f7; }
        .glow-3 { width: 350px; height: 350px; top: 50%; left: 30%; background: #3b82f6; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 16px;
        }

        .card {
            background: #1a1e2a;
            border-radius: 24px;
            padding: 16px 20px;
            margin-bottom: 20px;
            border: 1px solid #2d3748;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
        }

        .subtitle {
            font-size: 13px;
            color: #9ca3af;
        }

        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 8px 18px;
            background: #0f1117;
            border: 1px solid #2d3748;
            border-radius: 30px;
            color: #9ca3af;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #6c8cff;
            border-color: #6c8cff;
            color: #fff;
        }

        .panel {
            display: none;
            background: #1a1e2a;
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #2d3748;
        }
        .panel.active { display: block; }
        .panel h2 {
            font-size: 18px;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2d3748;
            font-weight: 600;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px 12px;
            background: #0f1117;
            border: 1px solid #2d3748;
            border-radius: 16px;
            color: #fff;
            font-size: 13px;
            margin-bottom: 12px;
        }
        textarea { min-height: 80px; resize: vertical; }
        button {
            width: 100%;
            padding: 10px;
            background: #6c8cff;
            border: none;
            border-radius: 30px;
            color: #fff;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            margin-top: 4px;
        }
        .mass-btn { background: #a855f7; }
        .delete-btn { background: #f8717120; color: #f87171; margin-top: 8px; }

        .info-box {
            background: #2d3748;
            border-left: 3px solid #a855f7;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 16px;
            font-size: 12px;
        }

        .template-item, .board-item {
            background: #0f1117;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 10px;
            border: 1px solid #2d3748;
            cursor: pointer;
        }
        .template-item.selected { border-color: #6c8cff; background: #1e2a3a; }
        .template-item strong { font-size: 14px; }

        .link-group { display: flex; gap: 8px; margin-bottom: 8px; }
        .link-group input { flex: 1; margin-bottom: 0; }
        .remove-link { background: #f8717120; color: #f87171; padding: 10px; border-radius: 16px; cursor: pointer; width: 40px; text-align: center; }

        .empty-state { text-align: center; padding: 30px; color: #9ca3af; font-size: 13px; }

        @media (max-width: 768px) {
            .container { padding: 12px; }
            .card { padding: 14px 16px; }
            .panel { padding: 16px; }
            h1 { font-size: 20px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="glow-bg"><div class="glow glow-1"></div><div class="glow glow-2"></div><div class="glow glow-3"></div></div>
    <div class="container">
        <div class="card"><div class="header"><h1>🎛️ Медиакоординатор</h1><div class="subtitle">Управление</div></div></div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="board">📢 Доска</button>
            <button class="tab-btn" data-tab="templates">📋 Шаблоны</button>
            <button class="tab-btn" data-tab="send">🚀 Отправить</button>
            <button class="tab-btn" data-tab="active">📊 Активные</button>
        </div>

        <!-- Доска объявлений -->
        <div id="board-panel" class="panel active">
            <h2>📢 Создать задание</h2>
            <input type="text" id="boardTitle" placeholder="Название">
            <textarea id="boardDesc" placeholder="Описание"></textarea>
            <textarea id="boardTech" placeholder="📋 ТЗ (формат, требования, куда загружать)"></textarea>
            <input type="datetime-local" id="boardDeadline">
            <button onclick="createBoardTask()">📢 Опубликовать</button>
            <h2 style="margin-top:20px;">📋 Активные задания</h2>
            <div id="boardTasksList" class="empty-state">Загрузка...</div>
        </div>

        <!-- Шаблоны -->
        <div id="templates-panel" class="panel">
            <h2>📋 Шаблоны</h2>
            <div id="templatesList" class="empty-state">Загрузка...</div>
            <input type="text" id="newTitle" placeholder="Название">
            <textarea id="newDesc" placeholder="Описание"></textarea>
            <select id="newType"><option value="raspush">📢 Распуш</option><option value="event">🎉 Событие</option><option value="optional">⭐ По желанию</option></select>
            <button onclick="createTemplate()">+ Создать</button>
        </div>

        <!-- Отправка -->
        <div id="send-panel" class="panel">
            <h2>🚀 Отправить всем</h2>
            <div class="info-box" id="infoBox">🔥 <strong>РАСПУШ</strong> — ссылки обязательны</div>
            <div style="background:#0f1117; padding:10px; border-radius:16px; margin-bottom:16px; text-align:center;">⚡ Шаблон: <strong id="selectedName">не выбран</strong></div>
            <div id="linksBlock">
                <div id="linksContainer"><div class="link-group"><input type="text" id="link1" placeholder="Ссылка 1"><div class="remove-link" onclick="removeLink(1)" style="display:none;">✖</div></div></div>
                <button type="button" id="addLinkBtn" onclick="addLink()" style="background:#2d3748; margin-top:4px; display:none;">+ Добавить ссылку</button>
            </div>
            <input type="datetime-local" id="sendDeadline" placeholder="Срок">
            <textarea id="sendComment" placeholder="Комментарий"></textarea>
            <button class="mass-btn" onclick="sendToAll()">📤 ОТПРАВИТЬ</button>
            <div id="sendWarning" style="color:#f87171; font-size:11px; margin-top:8px; display:none;">⚠️ Для распуша нужны ссылки и срок</div>
        </div>

        <!-- Активные задачи -->
        <div id="active-panel" class="panel">
            <h2>📊 Активные задачи</h2>
            <div id="activeList" class="empty-state">Загрузка...</div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://csvynjkhhlexbnwpziup.supabase.co';
        const SUPABASE_KEY = 'sb_publishable__WbXqBZhgBBU-dDFEvXVeA_PQYwa_y7';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let selectedId = null, selectedType = null, selectedTitle = null;
        let linkCounter = 1;

        // Доска
        async function loadBoardTasks() {
            const { data } = await sb.from('board_tasks').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('boardTasksList');
            if (!data?.length) { container.innerHTML = '<div class="empty-state">📭 Нет заданий</div>'; return; }
            const { data: parts } = await sb.from('board_participants').select('board_task_id');
            const counts = {};
            for (let p of parts || []) counts[p.board_task_id] = (counts[p.board_task_id] || 0) + 1;
            container.innerHTML = data.map(t => `
                <div class="board-item" style="cursor:default;">
                    <strong>${t.title}</strong>
                    <div style="font-size:11px; color:#9ca3af;">📅 До: ${new Date(t.deadline).toLocaleString()}</div>
                    <div style="font-size:12px; margin-top:4px;">${t.description || ''}</div>
                    <div style="font-size:11px; margin-top:6px; color:#6c8cff;">📋 ТЗ: ${t.technical_task || '-'}</div>
                    <div style="font-size:11px; margin-top:4px;">👥 Участников: ${counts[t.id] || 0}</div>
                    <button class="delete-btn" onclick="deleteBoard(${t.id})">🗑 Удалить</button>
                </div>
            `).join('');
        }
        window.deleteBoard = async (id) => { if(confirm('Удалить?')){ await sb.from('board_participants').delete().eq('board_task_id', id); await sb.from('board_tasks').delete().eq('id', id); loadBoardTasks(); } };
        window.createBoardTask = async () => {
            const title = document.getElementById('boardTitle').value;
            const deadline = document.getElementById('boardDeadline').value;
            if (!title || !deadline) { alert('Заполните название и срок'); return; }
            await sb.from('board_tasks').insert([{ title, description: document.getElementById('boardDesc').value, technical_task: document.getElementById('boardTech').value, deadline: new Date(deadline).toISOString(), is_active: true }]);
            document.getElementById('boardTitle').value = ''; document.getElementById('boardDesc').value = ''; document.getElementById('boardTech').value = ''; document.getElementById('boardDeadline').value = '';
            loadBoardTasks(); showToast('✅ Опубликовано');
        };

        // Шаблоны
        async function loadTemplates() {
            const { data } = await sb.from('task_templates').select('*').eq('is_active', true);
            const container = document.getElementById('templatesList');
            if (!data?.length) { container.innerHTML = '<div class="empty-state">Нет шаблонов</div>'; return; }
            container.innerHTML = data.map(t => `<div class="template-item" onclick="selectTemplate(${t.id}, '${t.title.replace(/'/g, "\\'")}', '${t.type}')"><strong>${t.title}</strong><div style="font-size:11px; color:#9ca3af;">${t.type === 'raspush' ? '📢 Распуш' : (t.type === 'event' ? '🎉 Событие' : '⭐ По желанию')}</div></div>`).join('');
        }
        window.selectTemplate = function(id, title, type) {
            selectedId = id; selectedType = type; selectedTitle = title;
            document.getElementById('selectedName').innerText = title;
            const addBtn = document.getElementById('addLinkBtn'), warn = document.getElementById('sendWarning'), info = document.getElementById('infoBox');
            if (type === 'raspush') {
                addBtn.style.display = 'block';
                warn.style.display = 'block';
                info.innerHTML = '🔥 <strong>РАСПУШ</strong> — можно добавить несколько ссылок<br>• Ссылки и срок обязательны!';
                document.querySelector('#linksContainer input').placeholder = 'Ссылка 1 (обязательно)';
            } else {
                addBtn.style.display = 'none';
                warn.style.display = 'none';
                info.innerHTML = type === 'event' ? '🎉 <strong>СОБЫТИЕ</strong> — ссылка не обязательна' : '⭐ <strong>ПО ЖЕЛАНИЮ</strong> — ссылка не обязательна';
                document.querySelector('#linksContainer input').placeholder = 'Ссылка (опционально)';
            }
        };
        window.addLink = () => { if(selectedType !== 'raspush') return; linkCounter++; const div = document.createElement('div'); div.className = 'link-group'; div.id = `link-group-${linkCounter}`; div.innerHTML = `<input type="text" id="link${linkCounter}" placeholder="Ссылка ${linkCounter}"><div class="remove-link" onclick="removeLink(${linkCounter})">✖</div>`; document.getElementById('linksContainer').appendChild(div); };
        window.removeLink = (id) => { document.getElementById(`link-group-${id}`)?.remove(); };
        function getAllLinks() { let links = []; for(let i=1; i<=linkCounter; i++) { let inp = document.getElementById(`link${i}`); if(inp && inp.value.trim()) links.push(inp.value.trim()); } return links; }

        // Отправка
        window.sendToAll = async () => {
            if (!selectedId) { alert('Выберите шаблон'); return; }
            const links = getAllLinks(), deadline = document.getElementById('sendDeadline').value, comment = document.getElementById('sendComment').value;
            if (selectedType === 'raspush') {
                if (links.length === 0) { alert('Нужна ссылка'); return; }
                if (!deadline) { alert('Нужен срок'); return; }
            }
            const { data: chiefs } = await sb.from('chiefs').select('id, district_id');
            if (!chiefs?.length) { alert('Нет шефов'); return; }
            let ok = 0;
            for (let c of chiefs) {
                const { error } = await sb.from('assignments').insert([{ template_id: selectedId, chief_id: c.id, district_id: c.district_id, link: links.join(', '), coordinator_comment: comment, deadline: deadline ? new Date(deadline).toISOString() : null, status: 'pending', type: selectedType }]);
                if (!error) ok++;
            }
            alert(`✅ Отправлено ${ok} шефам`);
            document.getElementById('sendDeadline').value = ''; document.getElementById('sendComment').value = '';
            loadActive();
        };

        // Активные задачи
        async function loadActive() {
            const { data } = await sb.from('assignments').select('*, task_templates(*), chiefs(name, primary_branch_id)').neq('status', 'completed').order('created_at', { ascending: false }).limit(30);
            const container = document.getElementById('activeList');
            if (!data?.length) { container.innerHTML = '<div class="empty-state">✅ Нет активных</div>'; return; }
            container.innerHTML = data.map(t => `<div style="background:#0f1117; padding:12px; border-radius:16px; margin-bottom:10px;"><div style="display:flex; justify-content:space-between;"><strong>${t.task_templates?.title || 'Задача'}</strong><span style="background:#f59e0b20; color:#f59e0b; padding:2px 10px; border-radius:20px; font-size:10px;">${t.status}</span></div><div style="font-size:11px; margin-top:6px;">Шеф: ${t.chiefs?.name}</div>${t.deadline ? `<div style="font-size:10px;">⏰ ${new Date(t.deadline).toLocaleString()}</div>` : ''}${t.link ? `<a href="${t.link.split(',')[0]}" target="_blank" style="color:#6c8cff; font-size:11px;">🔗 Ссылка</a>` : ''}</div>`).join('');
        }

        window.createTemplate = async () => {
            const title = document.getElementById('newTitle').value, desc = document.getElementById('newDesc').value, type = document.getElementById('newType').value;
            if (!title) { alert('Введите название'); return; }
            await sb.from('task_templates').insert([{ title, description: desc, type, is_active: true }]);
            document.getElementById('newTitle').value = ''; document.getElementById('newDesc').value = '';
            loadTemplates(); showToast('✅ Шаблон создан');
        };

        function showToast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2000); }

        document.querySelectorAll('.tab-btn').forEach(btn => { btn.onclick = () => { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.getElementById(btn.dataset.tab + '-panel').classList.add('active'); if(btn.dataset.tab === 'board') loadBoardTasks(); if(btn.dataset.tab === 'templates') loadTemplates(); if(btn.dataset.tab === 'active') loadActive(); }; });
        loadBoardTasks(); loadTemplates(); loadActive();
    </script>
</body>
</html>
