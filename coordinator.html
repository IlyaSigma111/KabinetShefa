<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Медиакоординатор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: #0a0c10;
            color: rgba(255, 255, 255, 0.95);
            min-height: 100vh;
        }

        .dark-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
        }

        .sphere-1 { width: 600px; height: 600px; top: -200px; right: -200px; background: linear-gradient(135deg, #667eea, #764ba2); }
        .sphere-2 { width: 500px; height: 500px; bottom: -200px; left: -100px; background: linear-gradient(135deg, #ff6b6b, #ff8e53); }
        .sphere-3 { width: 400px; height: 400px; top: 50%; left: 30%; background: linear-gradient(135deg, #4facfe, #00f2fe); }

        .glass-card {
            background: rgba(20, 25, 35, 0.3);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
        }

        .header {
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header h1 {
            font-size: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .panel {
            padding: 20px;
        }

        .panel h2 {
            font-size: 18px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        select, input, textarea {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            color: white;
            font-size: 14px;
            margin-bottom: 12px;
            font-family: inherit;
        }

        textarea {
            min-height: 80px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 14px;
            background: rgba(108, 140, 255, 0.2);
            border: 1px solid rgba(108, 140, 255, 0.3);
            border-radius: 30px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .template-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 14px;
            border-radius: 20px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .template-item:hover {
            background: rgba(108, 140, 255, 0.1);
            transform: translateX(5px);
        }

        .task-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 14px;
            border-radius: 20px;
            margin-bottom: 10px;
        }

        .task-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
        }

        .status-pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .status-completed { background: rgba(16, 185, 129, 0.2); color: #10b981; }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .container {
                padding: 12px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="dark-glow">
        <div class="glow-sphere sphere-1"></div>
        <div class="glow-sphere sphere-2"></div>
        <div class="glow-sphere sphere-3"></div>
    </div>

    <div class="container">
        <div class="header glass-card">
            <h1>🎛️ Медиакоординатор</h1>
            <div style="font-size: 13px; opacity: 0.6;">Управление задачами</div>
        </div>

        <div class="grid">
            <div class="panel glass-card">
                <h2>📋 Шаблоны задач</h2>
                <div id="templatesList"></div>
                <input type="text" id="newTemplateTitle" placeholder="Название шаблона">
                <textarea id="newTemplateDesc" placeholder="Описание шаблона"></textarea>
                <button onclick="createTemplate()">+ Создать шаблон</button>
            </div>

            <div class="panel glass-card">
                <h2>✏️ Создать задачу</h2>
                <select id="templateSelect">
                    <option value="">Выберите шаблон</option>
                </select>
                <select id="districtSelect">
                    <option value="">Выберите округ (всем шефам)</option>
                </select>
                <select id="branchSelect">
                    <option value="">Или конкретную первичку</option>
                </select>
                <input type="text" id="taskLink" placeholder="Ссылка (опционально)">
                <textarea id="taskComment" placeholder="Комментарий"></textarea>
                <button onclick="createAssignment()">📤 Отправить задачу</button>
            </div>

            <div class="panel glass-card">
                <h2>📊 Активные задачи</h2>
                <div id="activeTasksList" style="max-height: 500px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://csvynjkhhlexbnwpziup.supabase.co';
        const SUPABASE_KEY = 'sb_publishable__WbXqBZhgBBU-dDFEvXVeA_PQYwa_y7';
        
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadTemplates() {
            const { data, error } = await sb.from('task_templates').select('*').eq('is_active', true);
            if (error) {
                console.error('Ошибка загрузки шаблонов:', error);
                return;
            }
            const container = document.getElementById('templatesList');
            const select = document.getElementById('templateSelect');
            
            if (data?.length) {
                container.innerHTML = data.map(t => `
                    <div class="template-item" onclick="selectTemplate(${t.id})">
                        <strong>${t.title}</strong>
                        <div style="font-size: 12px; opacity: 0.6;">${t.description || ''}</div>
                    </div>
                `).join('');
                select.innerHTML = '<option value="">Выберите шаблон</option>' + 
                    data.map(t => `<option value="${t.id}">${t.title}</option>`).join('');
            } else {
                container.innerHTML = '<p style="opacity: 0.5;">Нет шаблонов</p>';
            }
        }

        async function loadDistricts() {
            const { data, error } = await sb.from('districts').select('*').order('name');
            if (error) return;
            const select = document.getElementById('districtSelect');
            select.innerHTML = '<option value="">Выберите округ (всем шефам)</option>' + 
                (data || []).map(d => `<option value="${d.id}">${d.name}</option>`).join('');
        }

        async function loadBranches() {
            const { data, error } = await sb.from('primary_branches').select('*, districts(name)');
            if (error) return;
            const select = document.getElementById('branchSelect');
            select.innerHTML = '<option value="">Выберите первичку</option>' + 
                (data || []).map(b => `<option value="${b.id}">${b.districts?.name} — ${b.name}</option>`).join('');
        }

        async function loadActiveTasks() {
            const { data, error } = await sb
                .from('assignments')
                .select('*, task_templates(*), chiefs(name)')
                .neq('status', 'completed')
                .order('created_at', { ascending: false });
            
            if (error) return;
            
            const container = document.getElementById('activeTasksList');
            if (!data?.length) {
                container.innerHTML = '<p style="opacity: 0.5; text-align: center; padding: 40px;">✅ Нет активных задач</p>';
                return;
            }
            
            container.innerHTML = data.map(task => `
                <div class="task-item">
                    <strong>${task.task_templates?.title || 'Задача'}</strong>
                    <span class="task-status status-${task.status}">${task.status === 'pending' ? '⏳ Ожидает' : '🔄 В работе'}</span>
                    <div style="font-size: 12px; opacity: 0.7; margin-top: 6px;">Шеф: ${task.chiefs?.name || 'Шеф'}</div>
                    ${task.link ? `<a href="${task.link}" target="_blank" style="color: #6c8cff; font-size: 12px;">🔗 Ссылка</a>` : ''}
                </div>
            `).join('');
        }

        async function createTemplate() {
            const title = document.getElementById('newTemplateTitle').value;
            const desc = document.getElementById('newTemplateDesc').value;
            if (!title) { alert('Введите название'); return; }
            
            const { error } = await sb.from('task_templates').insert([{ title, description: desc }]);
            if (error) {
                alert('Ошибка: ' + error.message);
                return;
            }
            document.getElementById('newTemplateTitle').value = '';
            document.getElementById('newTemplateDesc').value = '';
            loadTemplates();
            alert('Шаблон создан');
        }

        async function createAssignment() {
            const templateId = document.getElementById('templateSelect').value;
            const districtId = document.getElementById('districtSelect').value;
            const branchId = document.getElementById('branchSelect').value;
            const link = document.getElementById('taskLink').value;
            const comment = document.getElementById('taskComment').value;
            
            if (!templateId) { alert('Выберите шаблон'); return; }
            
            let chiefs = [];
            
            if (branchId) {
                const { data } = await sb
                    .from('chiefs')
                    .select('id, district_id')
                    .eq('primary_branch_id', parseInt(branchId));
                chiefs = data || [];
            } else if (districtId) {
                const { data } = await sb
                    .from('chiefs')
                    .select('id, district_id')
                    .eq('district_id', parseInt(districtId));
                chiefs = data || [];
            } else {
                alert('Выберите округ или первичку');
                return;
            }
            
            if (chiefs.length === 0) {
                alert('Нет шефов для назначения');
                return;
            }
            
            for (const chief of chiefs) {
                await sb.from('assignments').insert([{
                    template_id: parseInt(templateId),
                    chief_id: chief.id,
                    district_id: chief.district_id,
                    link: link,
                    coordinator_comment: comment,
                    status: 'pending'
                }]);
            }
            
            alert(`Задача отправлена ${chiefs.length} шефам!`);
            document.getElementById('taskLink').value = '';
            document.getElementById('taskComment').value = '';
            loadActiveTasks();
        }

        function selectTemplate(id) {
            document.getElementById('templateSelect').value = id;
        }

        loadTemplates();
        loadDistricts();
        loadBranches();
        loadActiveTasks();
    </script>
</body>
</html>
