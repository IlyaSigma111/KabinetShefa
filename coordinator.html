<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Медиакоординатор</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0c10;
            color: rgba(255, 255, 255, 0.95);
            min-height: 100vh;
        }

        .dark-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
        }

        .sphere-1 { width: 600px; height: 600px; top: -200px; right: -200px; background: linear-gradient(135deg, #667eea, #764ba2); }
        .sphere-2 { width: 500px; height: 500px; bottom: -200px; left: -100px; background: linear-gradient(135deg, #ff6b6b, #ff8e53); }
        .sphere-3 { width: 400px; height: 400px; top: 50%; left: 30%; background: linear-gradient(135deg, #4facfe, #00f2fe); }

        .glass-card {
            background: rgba(20, 25, 35, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 16px;
        }

        .header {
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header h1 {
            font-size: 22px;
            font-weight: 700;
        }

        .grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel {
            padding: 20px;
        }

        .panel h2 {
            font-size: 18px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
        }

        select, input, textarea {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            color: white;
            font-size: 15px;
            margin-bottom: 14px;
            font-family: inherit;
        }

        textarea {
            min-height: 90px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 14px;
            background: rgba(108, 140, 255, 0.25);
            border: 1px solid rgba(108, 140, 255, 0.4);
            border-radius: 30px;
            color: white;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .mass-btn {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.4), rgba(236, 72, 153, 0.4));
            border-color: rgba(168, 85, 247, 0.6);
            font-size: 16px;
            padding: 16px;
            margin-top: 8px;
        }

        .template-item {
            background: rgba(0, 0, 0, 0.35);
            padding: 14px 16px;
            border-radius: 20px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .template-item:active {
            transform: scale(0.98);
        }

        .template-item.selected {
            background: rgba(108, 140, 255, 0.25);
            border: 1px solid rgba(108, 140, 255, 0.4);
        }

        .template-item strong {
            font-size: 16px;
        }

        .task-item {
            background: rgba(0, 0, 0, 0.35);
            padding: 14px 16px;
            border-radius: 20px;
            margin-bottom: 10px;
        }

        .task-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 500;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .info-box {
            background: rgba(59, 130, 246, 0.1);
            border-left: 4px solid #a855f7;
            padding: 12px 16px;
            border-radius: 18px;
            margin-bottom: 20px;
            font-size: 13px;
            line-height: 1.4;
        }

        .selected-template-info {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 18px;
            margin-bottom: 16px;
            text-align: center;
            font-size: 14px;
        }

        .chiefs-count {
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 14px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 14px;
            font-size: 12px;
        }

        @media (min-width: 768px) {
            .container {
                padding: 24px;
            }
            .header {
                padding: 20px 28px;
            }
            .header h1 {
                font-size: 26px;
            }
            .grid {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 24px;
            }
            .panel {
                padding: 24px;
            }
            .panel h2 {
                font-size: 20px;
            }
        }

        @media (min-width: 1024px) {
            .container {
                padding: 32px;
            }
            .panel {
                padding: 28px;
            }
        }

        @media (max-width: 480px) {
            .header {
                flex-direction: column;
                text-align: center;
            }
            .panel {
                padding: 16px;
            }
            .info-box {
                font-size: 12px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="dark-glow">
        <div class="glow-sphere sphere-1"></div>
        <div class="glow-sphere sphere-2"></div>
        <div class="glow-sphere sphere-3"></div>
    </div>

    <div class="container">
        <div class="header glass-card">
            <h1>Медиакоординатор</h1>
            <div style="font-size: 13px; opacity: 0.6;">Управление задачами</div>
        </div>

        <div class="grid">
            <div class="panel glass-card">
                <h2>Шаблоны задач</h2>
                <div id="templatesList"></div>
                <input type="text" id="newTemplateTitle" placeholder="Название шаблона">
                <textarea id="newTemplateDesc" placeholder="Описание шаблона"></textarea>
                <button onclick="createTemplate()">+ Создать шаблон</button>
            </div>

            <div class="panel glass-card">
                <h2>Отправить задачу всем</h2>
                <div class="info-box">
                    🔥 Как отправить задачу всем:<br>
                    1. Выберите шаблон<br>
                    2. Вставьте ссылку<br>
                    3. Установите срок<br>
                    4. Нажмите "Отправить всем"
                </div>
                <div class="selected-template-info">
                    Выбран шаблон: <strong id="selectedTemplateName">не выбран</strong>
                </div>
                <input type="text" id="taskLink" placeholder="Ссылка (опционально)">
                <input type="datetime-local" id="taskDeadline" placeholder="Срок выполнения">
                <textarea id="taskComment" placeholder="Комментарий"></textarea>
                <button class="mass-btn" onclick="sendToAllChiefs()">📤 Отправить всем шефам</button>
            </div>

            <div class="panel glass-card">
                <h2>Активные задачи</h2>
                <div id="chiefsCount" class="chiefs-count">Загрузка...</div>
                <div id="activeTasksList" style="max-height: 500px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const SUPABASE_URL = 'https://csvynjkhhlexbnwpziup.supabase.co';
            const SUPABASE_KEY = 'sb_publishable__WbXqBZhgBBU-dDFEvXVeA_PQYwa_y7';
            
            if (typeof supabase === 'undefined') {
                console.error('Supabase не загружен');
                return;
            }
            
            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            
            let selectedTemplateId = null;
            let selectedTemplateTitle = null;

            async function loadTemplates() {
                const { data, error } = await supabaseClient
                    .from('task_templates')
                    .select('*')
                    .eq('is_active', true);
                
                if (error) return;
                
                const container = document.getElementById('templatesList');
                if (data && data.length > 0) {
                    container.innerHTML = data.map(function(t) {
                        return '<div class="template-item" onclick="selectTemplate(' + t.id + ', \'' + t.title.replace(/'/g, "\\'") + '\')">' +
                            '<strong>' + t.title + '</strong>' +
                            '<div style="font-size: 12px; opacity: 0.6; margin-top: 4px;">' + (t.description || '') + '</div>' +
                            '</div>';
                    }).join('');
                } else {
                    container.innerHTML = '<p style="opacity:0.5; text-align:center; padding:30px;">Нет шаблонов</p>';
                }
            }

            window.selectTemplate = function(id, title) {
                selectedTemplateId = id;
                selectedTemplateTitle = title;
                document.getElementById('selectedTemplateName').innerText = title;
                
                const items = document.querySelectorAll('.template-item');
                for (let i = 0; i < items.length; i++) {
                    items[i].classList.remove('selected');
                }
                event.currentTarget.classList.add('selected');
            };

            async function loadChiefsCount() {
                const { count, error } = await supabaseClient
                    .from('chiefs')
                    .select('*', { count: 'exact', head: true });
                
                if (!error) {
                    document.getElementById('chiefsCount').innerHTML = '👥 Всего шефов: ' + (count || 0);
                }
            }

            async function loadActiveTasks() {
                const { data, error } = await supabaseClient
                    .from('assignments')
                    .select('*, task_templates(*), chiefs(name, primary_branch_id)')
                    .neq('status', 'completed')
                    .order('created_at', { ascending: false })
                    .limit(30);
                
                if (error) return;
                
                const container = document.getElementById('activeTasksList');
                if (!data || data.length === 0) {
                    container.innerHTML = '<p style="opacity:0.5; text-align:center; padding:40px;">Нет активных задач</p>';
                    return;
                }
                
                container.innerHTML = data.map(function(task) {
                    let deadlineHtml = '';
                    if (task.deadline) {
                        deadlineHtml = '<div style="font-size: 11px; margin-top: 6px;">⏰ Срок: ' + new Date(task.deadline).toLocaleString() + '</div>';
                    }
                    return '<div class="task-item">' +
                        '<div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;">' +
                            '<strong style="font-size: 15px;">' + (task.task_templates?.title || 'Задача') + '</strong>' +
                            '<span class="task-status status-pending">⏳ ' + (task.status === 'pending' ? 'Ожидает' : 'В работе') + '</span>' +
                        '</div>' +
                        '<div style="font-size: 12px; opacity: 0.7; margin-top: 8px;">Шеф: ' + (task.chiefs?.name || 'Шеф') + ' | ' + (task.chiefs?.primary_branch_id ? 'Первичка' : 'Местное') + '</div>' +
                        deadlineHtml +
                        (task.link ? '<a href="' + task.link + '" target="_blank" style="color: #6c8cff; font-size: 12px; margin-top: 6px; display: inline-block;">🔗 Ссылка</a>' : '') +
                    '</div>';
                }).join('');
            }

            window.createTemplate = async function() {
                const title = document.getElementById('newTemplateTitle').value;
                const desc = document.getElementById('newTemplateDesc').value;
                
                if (!title) {
                    alert('Введите название шаблона');
                    return;
                }
                
                const { error } = await supabaseClient
                    .from('task_templates')
                    .insert([{ title: title, description: desc }]);
                
                if (error) {
                    alert('Ошибка: ' + error.message);
                    return;
                }
                
                document.getElementById('newTemplateTitle').value = '';
                document.getElementById('newTemplateDesc').value = '';
                loadTemplates();
                alert('✅ Шаблон создан');
            };

            window.sendToAllChiefs = async function() {
                if (!selectedTemplateId) {
                    alert('Сначала выберите шаблон задачи');
                    return;
                }
                
                const link = document.getElementById('taskLink').value;
                const deadline = document.getElementById('taskDeadline').value;
                const comment = document.getElementById('taskComment').value;
                
                const { data: allChiefs, error } = await supabaseClient
                    .from('chiefs')
                    .select('id, district_id');
                
                if (error) {
                    alert('Ошибка: ' + error.message);
                    return;
                }
                
                if (!allChiefs || allChiefs.length === 0) {
                    alert('Нет шефов для отправки');
                    return;
                }
                
                let successCount = 0;
                for (let i = 0; i < allChiefs.length; i++) {
                    const chief = allChiefs[i];
                    const { error: insertError } = await supabaseClient
                        .from('assignments')
                        .insert([{
                            template_id: selectedTemplateId,
                            chief_id: chief.id,
                            district_id: chief.district_id,
                            link: link || null,
                            coordinator_comment: comment || null,
                            deadline: deadline ? new Date(deadline).toISOString() : null,
                            status: 'pending'
                        }]);
                    
                    if (!insertError) successCount++;
                }
                
                alert('✅ Задача "' + selectedTemplateTitle + '" отправлена ' + successCount + ' шефам!');
                
                document.getElementById('taskLink').value = '';
                document.getElementById('taskDeadline').value = '';
                document.getElementById('taskComment').value = '';
                loadActiveTasks();
            };

            loadTemplates();
            loadChiefsCount();
            loadActiveTasks();
            
            setInterval(function() {
                loadActiveTasks();
            }, 15000);
        });
    </script>
</body>
</html>
