<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Кабинет шеф-редактора</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0c10;
            color: rgba(255, 255, 255, 0.95);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dark-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
        }

        .sphere-1 { width: 600px; height: 600px; top: -200px; right: -200px; background: linear-gradient(135deg, #667eea, #764ba2); }
        .sphere-2 { width: 500px; height: 500px; bottom: -200px; left: -100px; background: linear-gradient(135deg, #ff6b6b, #ff8e53); }
        .sphere-3 { width: 400px; height: 400px; top: 50%; left: 30%; background: linear-gradient(135deg, #4facfe, #00f2fe); }

        .glass-card {
            background: rgba(20, 25, 35, 0.35);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), inset 0 0 0 1px rgba(255, 255, 255, 0.02);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            padding: 20px 28px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo h2 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #b0c4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .district-badge {
            background: rgba(108, 140, 255, 0.2);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            border: 1px solid rgba(108, 140, 255, 0.3);
            backdrop-filter: blur(10px);
        }

        .reset-btn {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 8px 20px;
            border-radius: 40px;
            color: #f87171;
            cursor: pointer;
            transition: all 0.2s;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-number {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #b0c4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 13px;
            opacity: 0.6;
            margin-top: 6px;
        }

        .menu-scroll {
            overflow-x: auto;
            margin-bottom: 24px;
            -webkit-overflow-scrolling: touch;
        }

        .menu-items {
            display: flex;
            gap: 12px;
            min-width: min-content;
        }

        .menu-btn {
            padding: 10px 24px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 40px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .menu-btn.active {
            background: rgba(108, 140, 255, 0.3);
            border: 1px solid rgba(108, 140, 255, 0.4);
            color: white;
        }

        .content {
            background: rgba(20, 25, 35, 0.3);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 24px;
            min-height: 500px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .page {
            display: none;
        }

        .page.active { display: block; }
        .page h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .board-item, .task-item {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 18px;
            border-radius: 24px;
            margin-bottom: 14px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.2s;
        }

        .board-title, .task-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .board-date, .deadline {
            font-size: 12px;
            margin: 6px 0;
            padding: 4px 12px;
            border-radius: 20px;
            display: inline-block;
        }
        .deadline-normal { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .deadline-urgent { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        .board-desc, .task-desc {
            font-size: 13px;
            opacity: 0.7;
            margin: 8px 0;
        }

        .board-tech {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 16px;
            margin: 10px 0;
            font-size: 12px;
            border-left: 3px solid #6c8cff;
        }

        .participate-btn, .btn-complete {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 10px;
            border-radius: 40px;
            color: #10b981;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            transition: all 0.2s;
        }

        .already-participating {
            background: rgba(108, 140, 255, 0.2);
            padding: 10px;
            border-radius: 40px;
            text-align: center;
            font-size: 13px;
        }

        .task-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            margin-top: 8px;
        }
        .status-pending { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .status-completed { background: rgba(16, 185, 129, 0.2); color: #10b981; }

        .link-input {
            width: 100%;
            padding: 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            color: white;
            margin-top: 12px;
        }

        .sent-links {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .sent-link {
            display: inline-block;
            background: rgba(108, 140, 255, 0.15);
            padding: 4px 10px;
            border-radius: 16px;
            font-size: 11px;
            margin: 2px;
            color: #6c8cff;
            text-decoration: none;
        }

        .history-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 16px;
            border-radius: 18px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
        }

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
        }
        .ranking-table th, .ranking-table td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 14px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 1000;
            border-left: 4px solid #6c8cff;
            font-size: 13px;
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .logo h2 { font-size: 20px; }
            .stat-number { font-size: 28px; }
            .content { padding: 18px; }
            .board-item, .task-item { padding: 14px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="dark-glow">
        <div class="glow-sphere sphere-1"></div>
        <div class="glow-sphere sphere-2"></div>
        <div class="glow-sphere sphere-3"></div>
    </div>

    <div class="container">
        <div class="header glass-card">
            <div class="logo"><h2>📰 Кабинет шеф-редактора</h2></div>
            <div style="display: flex; gap: 12px;">
                <span class="district-badge" id="districtDisplay">Загрузка...</span>
                <button class="reset-btn" onclick="resetAndExit()">Сменить</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalTasks">0</div><div class="stat-label">Всего задач</div></div>
            <div class="stat-card"><div class="stat-number" id="completedTasks">0</div><div class="stat-label">Выполнено</div></div>
            <div class="stat-card"><div class="stat-number" id="totalScore">0</div><div class="stat-label">Мои баллы</div></div>
        </div>

        <div class="menu-scroll">
            <div class="menu-items">
                <button class="menu-btn" data-page="board">📢 Доска</button>
                <button class="menu-btn active" data-page="tasks">📋 Задачи</button>
                <button class="menu-btn" data-page="rating">🏆 Рейтинг</button>
                <button class="menu-btn" data-page="history">📜 История</button>
                <button class="menu-btn" data-page="help">❓</button>
            </div>
        </div>

        <div class="content">
            <div id="board" class="page"><h3>📢 Доска объявлений</h3><div id="boardList" class="empty-state">⏳ Загрузка...</div></div>
            <div id="tasks" class="page active"><h3>📋 Мои задачи</h3><div id="tasksList" class="empty-state">⏳ Загрузка...</div></div>
            <div id="rating" class="page"><h3>🏆 Рейтинг округов</h3><div style="overflow-x:auto;"><table class="ranking-table"><thead> </thead><tbody id="ratingList"></tbody> </div></div>
            <div id="history" class="page"><h3>📜 История</h3><div id="historyList" class="empty-state">⏳ Загрузка...</div></div>
            <div id="help" class="page"><h3>❓ Справка</h3><p style="opacity:0.7; line-height:1.5;">• Участвуйте в заданиях с доски<br>• 1 ссылка = 1 балл<br>• Можно отправить несколько ссылок до дедлайна</p></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://csvynjkhhlexbnwpziup.supabase.co';
        const SUPABASE_KEY = 'sb_publishable__WbXqBZhgBBU-dDFEvXVeA_PQYwa_y7';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let chiefId = localStorage.getItem('chiefId');
        let districtName = localStorage.getItem('chiefDistrictName');
        let branchType = localStorage.getItem('chiefBranchType');
        let districtId = localStorage.getItem('chiefDistrictId');
        
        if (!chiefId) {
            document.getElementById('tasksList').innerHTML = '<div class="empty-state">⚠️ Ошибка. <a href="index.html" style="color:#6c8cff;">На главную</a></div>';
            document.getElementById('districtDisplay').innerHTML = 'Ошибка';
        } else {
            document.getElementById('districtDisplay').innerHTML = '📍 ' + (districtName || 'Неизвестно') + (branchType === 'primary' ? ' • Первичка' : '');
        }
        
        function isExpired(deadline) { return deadline && new Date(deadline) < new Date(); }
        
        async function loadBoard() {
            const { data } = await sb.from('board_tasks').select('*').eq('is_active', true).order('deadline');
            const { data: parts } = await sb.from('board_participants').select('board_task_id').eq('chief_id', chiefId);
            const mySet = new Set(parts?.map(p => p.board_task_id) || []);
            const container = document.getElementById('boardList');
            if (!data?.length) { container.innerHTML = '<div class="empty-state">📢 Нет заданий</div>'; return; }
            container.innerHTML = data.map(t => `<div class="board-item"><div class="board-title">${t.title}</div><div class="board-date">📅 До: ${new Date(t.deadline).toLocaleString()}</div><div class="board-desc">${t.description || ''}</div><div class="board-tech"><strong>📋 ТЗ:</strong><br>${t.technical_task || '-'}</div>${mySet.has(t.id) ? '<div class="already-participating">✅ Вы участвуете</div>' : (!isExpired(t.deadline) ? `<button class="participate-btn" onclick="participate(${t.id})">🎯 Участвовать</button>` : '<div class="already-participating" style="background:#f8717120; color:#f87171;">⏰ Срок истёк</div>')}</div>`).join('');
        }
        
        window.participate = async (id) => {
            const { data: task } = await sb.from('board_tasks').select('*').eq('id', id).single();
            await sb.from('board_participants').insert([{ board_task_id: id, chief_id: chiefId, district_id: districtId }]);
            await sb.from('assignments').insert([{ template_id: 2, title: task.title, description: task.description, chief_id: chiefId, district_id: districtId, coordinator_comment: task.technical_task, deadline: task.deadline, status: 'pending', type: 'event' }]);
            showToast('✅ Вы участвуете!'); loadBoard(); loadTasks();
        };
        
        async function loadTasks() {
            const { data: tasks } = await sb.from('assignments').select('*, task_templates(*)').eq('chief_id', chiefId).order('created_at', { ascending: false });
            const { data: history } = await sb.from('operations_history').select('assignment_id, description').eq('chief_id', chiefId).ilike('action', '%ссылка%');
            const sentMap = {};
            for (let h of history || []) { if (!sentMap[h.assignment_id]) sentMap[h.assignment_id] = []; const m = h.description.match(/ссылка: (https?:\/\/[^\s]+)/); if (m) sentMap[h.assignment_id].push(m[1]); }
            const container = document.getElementById('tasksList');
            if (!tasks?.length) { container.innerHTML = '<div class="empty-state">📭 Нет задач</div>'; return; }
            container.innerHTML = tasks.map(task => {
                const expired = isExpired(task.deadline);
                const sent = sentMap[task.id] || [];
                return `<div class="task-item"><div class="task-title">${task.title || task.task_templates?.title || 'Задача'}</div><div class="task-desc">${task.description || task.task_templates?.description || ''}</div>${task.deadline ? `<div class="deadline ${expired ? 'deadline-urgent' : 'deadline-normal'}">⏰ Срок: ${new Date(task.deadline).toLocaleString()}</div>` : ''}${task.coordinator_comment ? `<div style="font-size:12px; margin:6px 0; color:#6c8cff;">💬 ${task.coordinator_comment}</div>` : ''}${sent.length ? `<div class="sent-links"><div style="font-size:11px; margin-bottom:6px;">✅ Отправлено (${sent.length}):</div>${sent.map(l => `<a href="${l}" target="_blank" class="sent-link">🔗 ${l.length > 35 ? l.substring(0,35)+'...' : l}</a>`).join('')}</div>` : ''}<div><span class="task-status ${task.status === 'pending' ? (expired ? 'status-expired' : 'status-pending') : 'status-completed'}">${task.status === 'pending' ? (expired ? '⏰ Просрочено' : '⏳ Ожидает') : '✅ Выполнено'}</span></div>${task.status === 'pending' && !expired ? `<input type="text" id="link_${task.id}" class="link-input" placeholder="Вставьте ссылку..."><button class="btn-complete" onclick="sendLink(${task.id})">📤 Отправить +1 балл</button>` : ''}</div>`;
            }).join('');
            loadStats();
        }
        
        window.sendLink = async (id) => {
            const link = document.getElementById(`link_${id}`)?.value.trim();
            if (!link) { alert('Вставьте ссылку'); return; }
            const { data: dup } = await sb.from('operations_history').select('id').eq('chief_id', chiefId).eq('assignment_id', id).ilike('description', `%${link}%`);
            if (dup?.length) { alert('❌ Эта ссылка уже была отправлена!'); return; }
            await sb.from('operations_history').insert([{ chief_id: chiefId, assignment_id: id, action: `Отправлена ссылка: ${link}` }]);
            const { data: cur } = await sb.from('chief_scores').select('total_score').eq('chief_id', chiefId).single();
            await sb.from('chief_scores').upsert({ chief_id: chiefId, total_score: (cur?.total_score || 0) + 1, updated_at: new Date() });
            const { data: chiefs } = await sb.from('chiefs').select('id').eq('district_id', districtId);
            let total = 0; for (let c of chiefs || []) { const { data: s } = await sb.from('chief_scores').select('total_score').eq('chief_id', c.id).single(); total += s?.total_score || 0; }
            await sb.from('district_scores').upsert({ district_id: districtId, total_score: total, updated_at: new Date() });
            document.getElementById(`link_${id}`).value = '';
            loadTasks(); loadHistory(); loadRating();
            showToast('✅ +1 балл!');
        };
        
        async function loadStats() {
            if (!chiefId) return;
            const { data: tasks } = await sb.from('assignments').select('status').eq('chief_id', chiefId);
            const { data: score } = await sb.from('chief_scores').select('total_score').eq('chief_id', chiefId).single();
            document.getElementById('totalTasks').innerText = tasks?.length || 0;
            document.getElementById('completedTasks').innerText = tasks?.filter(t => t.status === 'completed').length || 0;
            document.getElementById('totalScore').innerText = score?.total_score || 0;
        }
        
        async function loadHistory() {
            const { data } = await sb.from('operations_history').select('*').eq('chief_id', chiefId).order('created_at', { ascending: false }).limit(50);
            const container = document.getElementById('historyList');
            if (!data?.length) { container.innerHTML = '<div class="empty-state">📭 История пуста</div>'; return; }
            container.innerHTML = data.map(h => `<div class="history-item"><span>${h.action.length > 55 ? h.action.substring(0,55)+'...' : h.action}</span><span style="opacity:0.5;">${new Date(h.created_at).toLocaleString()}</span></div>`).join('');
        }
        
        async function loadRating() {
            const { data } = await sb.from('district_scores').select('*, districts(name)').order('total_score', { ascending: false });
            const container = document.getElementById('ratingList');
            if (!data?.length) { container.innerHTML = '<tr><td colspan="2" class="empty-state">Нет данных</td></tr>'; return; }
            container.innerHTML = data.map(d => `<tr><td style="font-weight:500;">${d.districts?.name || 'Неизвестно'}</td><td style="color:#6c8cff;">${d.total_score} баллов</td></tr>`).join('');
        }
        
        function showToast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2500); }
        window.resetAndExit = () => { localStorage.clear(); window.location.href = 'index.html'; };
        
        document.querySelectorAll('.menu-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(btn.dataset.page).classList.add('active');
                if (btn.dataset.page === 'board') loadBoard();
                if (btn.dataset.page === 'tasks') loadTasks();
                if (btn.dataset.page === 'rating') loadRating();
                if (btn.dataset.page === 'history') loadHistory();
            };
        });
        
        if (chiefId) { loadBoard(); loadTasks(); loadHistory(); loadRating(); setInterval(loadTasks, 30000); }
    </script>
</body>
</html>
