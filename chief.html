<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Кабинет шеф-редактора</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: #0a0c10;
            color: rgba(255, 255, 255, 0.95);
            min-height: 100vh;
        }

        .dark-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
        }

        .sphere-1 { width: 600px; height: 600px; top: -200px; right: -200px; background: linear-gradient(135deg, #667eea, #764ba2); }
        .sphere-2 { width: 500px; height: 500px; bottom: -200px; left: -100px; background: linear-gradient(135deg, #ff6b6b, #ff8e53); }
        .sphere-3 { width: 400px; height: 400px; top: 50%; left: 30%; background: linear-gradient(135deg, #4facfe, #00f2fe); }

        .glass-card {
            background: rgba(20, 25, 35, 0.4);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 16px;
        }

        .header {
            padding: 16px 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .logo h2 {
            font-size: 20px;
            font-weight: 700;
        }

        .district-badge {
            background: rgba(108, 140, 255, 0.2);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 14px;
        }

        .reset-btn {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 8px 20px;
            border-radius: 40px;
            color: #f87171;
            cursor: pointer;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.4);
            padding: 16px 12px;
            border-radius: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #b0c4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.6;
            margin-top: 6px;
        }

        .menu-scroll {
            overflow-x: auto;
            margin-bottom: 20px;
        }

        .menu-items {
            display: flex;
            gap: 10px;
        }

        .menu-btn {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: none;
            border-radius: 40px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }

        .menu-btn.active {
            background: rgba(108, 140, 255, 0.25);
            border: 1px solid rgba(108, 140, 255, 0.4);
            color: white;
        }

        .content {
            background: rgba(20, 25, 35, 0.35);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 20px;
            min-height: 400px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .page h3 {
            font-size: 18px;
            margin-bottom: 16px;
        }

        .task-item {
            background: rgba(0, 0, 0, 0.35);
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 12px;
        }

        .task-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .task-desc {
            font-size: 12px;
            opacity: 0.7;
        }

        .task-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 11px;
            margin-top: 8px;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .status-completed {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .btn-complete {
            background: rgba(16, 185, 129, 0.2);
            border: none;
            padding: 10px;
            border-radius: 40px;
            color: #10b981;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            width: 100%;
        }

        .link-input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: white;
            margin-top: 10px;
        }

        .debug-panel {
            background: rgba(0, 0, 0, 0.5);
            padding: 12px;
            border-radius: 16px;
            margin-top: 16px;
            font-family: monospace;
            font-size: 11px;
            color: #88ff88;
            word-break: break-all;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 16px;
            color: #f87171;
            text-align: center;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            opacity: 0.6;
        }

        @media (min-width: 768px) {
            .container { padding: 24px; }
            .stat-number { font-size: 36px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="dark-glow">
        <div class="glow-sphere sphere-1"></div>
        <div class="glow-sphere sphere-2"></div>
        <div class="glow-sphere sphere-3"></div>
    </div>

    <div class="container">
        <div class="header glass-card">
            <div class="logo"><h2>📰 Кабинет шеф-редактора</h2></div>
            <div style="display: flex; gap: 12px;">
                <span class="district-badge" id="districtDisplay">Загрузка...</span>
                <button class="reset-btn" onclick="resetAndExit()">Сменить</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalTasks">0</div><div class="stat-label">Всего задач</div></div>
            <div class="stat-card"><div class="stat-number" id="completedTasks">0</div><div class="stat-label">Выполнено</div></div>
            <div class="stat-card"><div class="stat-number" id="totalScore">0</div><div class="stat-label">Баллов</div></div>
        </div>

        <div class="menu-scroll">
            <div class="menu-items">
                <button class="menu-btn active" data-page="tasks">Мои задачи</button>
                <button class="menu-btn" data-page="rating">Рейтинг</button>
                <button class="menu-btn" data-page="history">История</button>
                <button class="menu-btn" data-page="debug">Отладка</button>
            </div>
        </div>

        <div class="content">
            <div id="tasks" class="page active">
                <h3>Мои задачи</h3>
                <div id="tasksList"></div>
            </div>
            <div id="rating" class="page">
                <h3>Рейтинг округов</h3>
                <div style="overflow-x: auto;"><table class="ranking-table"><thead> <tr><th>Округ</th><th>Баллы</th></tr> </thead><tbody id="ratingList"></tbody></table></div>
            </div>
            <div id="history" class="page">
                <h3>История</h3>
                <div id="historyList"></div>
            </div>
            <div id="debug" class="page">
                <h3>Отладка</h3>
                <div id="debugInfo" class="debug-panel">Загрузка...</div>
                <button onclick="forceReload()" style="margin-top: 12px; padding: 10px; background: rgba(108,140,255,0.3); border: none; border-radius: 30px; color: white; cursor: pointer;">🔄 Принудительная перезагрузка</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            let chiefId = localStorage.getItem('chiefId');
            let districtName = localStorage.getItem('chiefDistrictName');
            let branchType = localStorage.getItem('chiefBranchType');
            
            let debugLog = [];
            
            function addDebug(msg) {
                debugLog.unshift(new Date().toLocaleTimeString() + ': ' + msg);
                if (debugLog.length > 30) debugLog.pop();
                const debugDiv = document.getElementById('debugInfo');
                if (debugDiv) {
                    debugDiv.innerHTML = debugLog.map(l => '<div>' + l + '</div>').join('');
                }
                console.log(msg);
            }
            
            addDebug('=== СТРАНИЦА ЗАГРУЖЕНА ===');
            addDebug('chiefId из localStorage: ' + (chiefId || 'НЕ НАЙДЕН'));
            addDebug('districtName: ' + (districtName || 'НЕ НАЙДЕН'));
            
            if (!chiefId) {
                addDebug('ОШИБКА: нет chiefId');
                document.getElementById('tasksList').innerHTML = '<div class="error-message">⚠️ Ошибка: не выбран округ. <a href="index.html" style="color:#6c8cff;">Вернуться на главную</a></div>';
                document.getElementById('districtDisplay').innerHTML = 'Ошибка';
                return;
            }
            
            document.getElementById('districtDisplay').innerHTML = '📍 ' + (districtName || 'Неизвестно') + (branchType === 'primary' ? ' • Первичка' : '');
            
            if (typeof supabase === 'undefined') {
                addDebug('ОШИБКА: supabase не загружен');
                document.getElementById('tasksList').innerHTML = '<div class="error-message">⚠️ Ошибка загрузки Supabase</div>';
                return;
            }
            addDebug('Supabase загружен');
            
            const SUPABASE_URL = 'https://csvynjkhhlexbnwpziup.supabase.co';
            const SUPABASE_KEY = 'sb_publishable__WbXqBZhgBBU-dDFEvXVeA_PQYwa_y7';
            const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
                auth: { persistSession: false }
            });
            
            addDebug('Supabase клиент создан');
            
            // Прямой тестовый запрос
            async function testConnection() {
                addDebug('Тестовый запрос к таблице assignments...');
                try {
                    const { data, error, count } = await supabaseClient
                        .from('assignments')
                        .select('*', { count: 'exact' })
                        .limit(1);
                    
                    if (error) {
                        addDebug('ОШИБКА тестового запроса: ' + error.message);
                    } else {
                        addDebug('Тестовый запрос OK. Всего заданий в таблице: ' + count);
                        addDebug('Первое задание: ' + JSON.stringify(data?.[0] || 'нет данных').substring(0, 100));
                    }
                } catch (err) {
                    addDebug('ИСКЛЮЧЕНИЕ тестового запроса: ' + err.message);
                }
            }
            
            // Загрузка задач
            async function loadTasks() {
                addDebug('--- loadTasks() запущена ---');
                addDebug('Запрос для chiefId: ' + chiefId);
                
                const container = document.getElementById('tasksList');
                container.innerHTML = '<div class="empty-state">⏳ Загрузка...</div>';
                
                try {
                    const { data, error } = await supabaseClient
                        .from('assignments')
                        .select('*, task_templates(*)')
                        .eq('chief_id', chiefId)
                        .order('created_at', { ascending: false });
                    
                    if (error) {
                        addDebug('ОШИБКА запроса: ' + error.message);
                        container.innerHTML = '<div class="error-message">⚠️ ' + error.message + '</div>';
                        return;
                    }
                    
                    addDebug('Получено задач: ' + (data?.length || 0));
                    
                    if (!data || data.length === 0) {
                        addDebug('НЕТ ЗАДАЧ для этого chiefId');
                        container.innerHTML = '<div class="empty-state">📭 Нет задач для этого шефа</div>';
                        return;
                    }
                    
                    addDebug('Первая задача: ' + (data[0]?.task_templates?.title || 'без названия'));
                    
                    let html = '';
                    for (let i = 0; i < data.length; i++) {
                        const task = data[i];
                        html += '<div class="task-item">' +
                            '<div class="task-title">' + (task.task_templates?.title || 'Задача') + '</div>' +
                            '<div class="task-desc">' + (task.task_templates?.description || '') + '</div>' +
                            (task.link ? '<a href="' + task.link + '" target="_blank" style="color:#6c8cff;">🔗 Ссылка</a>' : '') +
                            '<div><span class="task-status status-' + task.status + '">' + (task.status === 'pending' ? '⏳ Ожидает' : '✅ Выполнено') + '</span></div>';
                        
                        if (task.status === 'pending') {
                            html += '<input type="text" id="link_' + task.id + '" class="link-input" placeholder="Вставьте ссылку (t.me или vk.com)">' +
                                    '<button class="btn-complete" onclick="completeTask(' + task.id + ')">✅ Выполнить +1 балл</button>';
                        }
                        html += '</div>';
                    }
                    container.innerHTML = html;
                    addDebug('Задачи отображены');
                } catch (err) {
                    addDebug('КРИТИЧЕСКАЯ ОШИБКА: ' + err.message);
                    container.innerHTML = '<div class="error-message">⚠️ ' + err.message + '</div>';
                }
            }
            
            window.completeTask = async function(taskId) {
                addDebug('Выполнение задачи ' + taskId);
                const linkInput = document.getElementById('link_' + taskId);
                const link = linkInput ? linkInput.value.trim() : '';
                if (!link) { alert('Вставьте ссылку'); return; }
                if (!link.includes('t.me') && !link.includes('vk.com')) { alert('Ссылка должна быть на t.me или vk.com'); return; }
                
                try {
                    await supabaseClient.from('assignments').update({ status: 'completed', link: link, completed_at: new Date() }).eq('id', taskId);
                    await supabaseClient.from('operations_history').insert([{ chief_id: chiefId, assignment_id: taskId, action: 'Выполнена задача +1 балл' }]);
                    
                    const { data: current } = await supabaseClient.from('chief_scores').select('total_score').eq('chief_id', chiefId).single();
                    const newScore = (current?.total_score || 0) + 1;
                    await supabaseClient.from('chief_scores').upsert({ chief_id: chiefId, total_score: newScore, updated_at: new Date() });
                    
                    addDebug('Задача выполнена, новый счет: ' + newScore);
                    loadTasks(); loadStats(); loadHistory();
                    alert('✅ Задача выполнена! +1 балл');
                } catch (err) {
                    addDebug('Ошибка выполнения: ' + err.message);
                    alert('Ошибка: ' + err.message);
                }
            };
            
            async function loadStats() {
                try {
                    const { data: tasks } = await supabaseClient.from('assignments').select('status').eq('chief_id', chiefId);
                    const { data: score } = await supabaseClient.from('chief_scores').select('total_score').eq('chief_id', chiefId).single();
                    document.getElementById('totalTasks').innerText = tasks?.length || 0;
                    document.getElementById('completedTasks').innerText = tasks ? tasks.filter(t => t.status === 'completed').length : 0;
                    document.getElementById('totalScore').innerText = score?.total_score || 0;
                    addDebug('Статистика: всего=' + (tasks?.length || 0) + ', баллов=' + (score?.total_score || 0));
                } catch (err) {
                    addDebug('Ошибка статистики: ' + err.message);
                }
            }
            
            async function loadHistory() {
                try {
                    const { data } = await supabaseClient.from('operations_history').select('*').eq('chief_id', chiefId).order('created_at', { ascending: false }).limit(30);
                    const container = document.getElementById('historyList');
                    if (!data || data.length === 0) {
                        container.innerHTML = '<div class="empty-state">📭 История пуста</div>';
                        return;
                    }
                    let html = '';
                    for (let i = 0; i < data.length; i++) {
                        html += '<div class="task-item" style="padding:12px;"><span>' + data[i].action + '</span><span style="float:right;">' + new Date(data[i].created_at).toLocaleString() + '</span></div>';
                    }
                    container.innerHTML = html;
                } catch (err) {
                    addDebug('Ошибка истории: ' + err.message);
                }
            }
            
            async function loadRating() {
                try {
                    const { data: chiefs } = await supabaseClient.from('chiefs').select('id, district_id, districts(name)');
                    const { data: scores } = await supabaseClient.from('chief_scores').select('*');
                    const scoreMap = {};
                    if (scores) for (let s of scores) scoreMap[s.chief_id] = s.total_score || 0;
                    const districts = {};
                    if (chiefs) {
                        for (let i = 0; i < chiefs.length; i++) {
                            const name = chiefs[i].districts?.name || 'Неизвестно';
                            districts[name] = (districts[name] || 0) + (scoreMap[chiefs[i].id] || 0);
                        }
                    }
                    const sorted = Object.entries(districts).sort((a,b) => b[1] - a[1]);
                    const container = document.getElementById('ratingList');
                    if (!sorted.length) { container.innerHTML = '运转<td colspan="2">Нет данных</tr>'; return; }
                    let html = '';
                    for (let i = 0; i < sorted.length; i++) {
                        html += '<tr><td>' + sorted[i][0] + '</td><td style="color:#6c8cff;">' + sorted[i][1] + ' баллов</td></tr>';
                    }
                    container.innerHTML = html;
                } catch (err) {
                    addDebug('Ошибка рейтинга: ' + err.message);
                }
            }
            
            window.resetAndExit = function() {
                localStorage.clear();
                window.location.href = 'index.html';
            };
            
            window.forceReload = function() {
                addDebug('=== ПРИНУДИТЕЛЬНАЯ ПЕРЕЗАГРУЗКА ===');
                loadTasks();
                loadStats();
                loadHistory();
                testConnection();
            };
            
            // Меню
            const btns = document.querySelectorAll('.menu-btn');
            for (let i = 0; i < btns.length; i++) {
                btns[i].onclick = function() {
                    for (let j = 0; j < btns.length; j++) btns[j].classList.remove('active');
                    this.classList.add('active');
                    for (let j = 0; j < document.querySelectorAll('.page').length; j++) {
                        document.querySelectorAll('.page')[j].classList.remove('active');
                    }
                    document.getElementById(this.dataset.page).classList.add('active');
                    if (this.dataset.page === 'rating') loadRating();
                    if (this.dataset.page === 'history') loadHistory();
                    if (this.dataset.page === 'debug') testConnection();
                };
            }
            
            // Запуск
            addDebug('Запуск загрузки данных...');
            testConnection();
            loadStats();
            loadTasks();
            loadHistory();
            loadRating();
            
            setInterval(function() {
                addDebug('Автообновление задач');
                loadTasks();
            }, 30000);
        })();
    </script>
</body>
</html>
