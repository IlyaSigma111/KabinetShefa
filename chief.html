<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Кабинет шеф-редактора</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
            background: #0a0c10;
            color: #fff;
            min-height: 100vh;
        }

        .glow-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
        }

        .sphere-1 { width: 600px; height: 600px; top: -200px; right: -200px; background: linear-gradient(135deg, #667eea, #764ba2); }
        .sphere-2 { width: 500px; height: 500px; bottom: -200px; left: -100px; background: linear-gradient(135deg, #ff6b6b, #ff8e53); }
        .sphere-3 { width: 400px; height: 400px; top: 50%; left: 30%; background: linear-gradient(135deg, #4facfe, #00f2fe); }

        .glass-card {
            background: rgba(20, 25, 35, 0.5);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
            padding: 16px 20px;
        }

        .logo h2 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #b0c4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .district-badge {
            background: rgba(108, 140, 255, 0.2);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
        }

        .reset-btn {
            background: rgba(239, 68, 68, 0.2);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: #f87171;
            cursor: pointer;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.4);
            padding: 16px;
            border-radius: 20px;
            text-align: center;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: #6c8cff;
        }

        .menu-scroll {
            overflow-x: auto;
            margin-bottom: 20px;
        }

        .menu-items {
            display: flex;
            gap: 10px;
        }

        .menu-btn {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: none;
            border-radius: 40px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }

        .menu-btn.active {
            background: rgba(108, 140, 255, 0.3);
            color: white;
        }

        .content {
            background: rgba(20, 25, 35, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 20px;
            min-height: 400px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .page h3 {
            font-size: 18px;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .task-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
        }

        .task-card:hover {
            background: rgba(108, 140, 255, 0.1);
        }

        .task-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .task-date {
            font-size: 11px;
            color: #f59e0b;
            margin-bottom: 8px;
        }

        .task-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .task-status.completed {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .task-status.expired {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        .task-detail {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .task-card.open .task-detail {
            display: block;
        }

        .task-detail p {
            font-size: 12px;
            margin-bottom: 8px;
            color: #ccc;
            line-height: 1.4;
        }

        .link-input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: white;
            margin-top: 10px;
        }

        .btn-submit {
            background: rgba(16, 185, 129, 0.2);
            border: none;
            padding: 10px;
            border-radius: 30px;
            color: #10b981;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: rgba(16, 185, 129, 0.4);
        }

        .sent-links {
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sent-link {
            display: inline-block;
            background: rgba(108, 140, 255, 0.2);
            padding: 4px 8px;
            border-radius: 14px;
            font-size: 10px;
            margin: 2px;
            color: #6c8cff;
            text-decoration: none;
        }

        .raspush-item {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .raspush-link {
            background: rgba(108, 140, 255, 0.15);
            padding: 10px;
            border-radius: 14px;
            margin: 10px 0;
            word-break: break-all;
        }

        .raspush-link a {
            color: #6c8cff;
            text-decoration: none;
        }

        .history-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
        }

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
        }

        .ranking-table th, .ranking-table td {
            padding: 10px 6px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            opacity: 0.6;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1e2a;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 12px;
            z-index: 1000;
        }

        @media (max-width: 768px) {
            .container { padding: 16px; }
            .logo h2 { font-size: 18px; }
            .stat-number { font-size: 24px; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="glow-bg">
        <div class="glow-sphere sphere-1"></div>
        <div class="glow-sphere sphere-2"></div>
        <div class="glow-sphere sphere-3"></div>
    </div>

    <div class="container">
        <div class="glass-card header">
            <div class="logo"><h2>📰 Кабинет шеф-редактора</h2></div>
            <div style="display: flex; gap: 8px;">
                <span class="district-badge" id="districtDisplay">Загрузка...</span>
                <button class="reset-btn" onclick="resetAndExit()">Сменить</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalTasks">0</div><div>Заданий</div></div>
            <div class="stat-card"><div class="stat-number" id="completedTasks">0</div><div>Выполнено</div></div>
            <div class="stat-card"><div class="stat-number" id="totalScore">0</div><div>Баллов</div></div>
        </div>

        <div class="menu-scroll">
            <div class="menu-items">
                <button class="menu-btn active" data-page="tasks">📋 Задания с доски</button>
                <button class="menu-btn" data-page="raspush">📢 Распуши</button>
                <button class="menu-btn" data-page="rating">🏆 Рейтинг</button>
                <button class="menu-btn" data-page="history">📜 История</button>
            </div>
        </div>

        <div class="content">
            <div id="tasks" class="page active">
                <h3>📋 Задания с доски</h3>
                <div id="tasksList" class="empty-state">Загрузка...</div>
            </div>

            <div id="raspush" class="page">
                <h3>📢 Распуши</h3>
                <div id="raspushList" class="empty-state">Загрузка...</div>
            </div>

            <div id="rating" class="page">
                <h3>🏆 Рейтинг округов</h3>
                <div style="overflow-x: auto;">
                    <table class="ranking-table">
                        <thead>
                            <tr><th>Округ</th><th>Баллы</th></tr>
                        </thead>
                        <tbody id="ratingList"></tbody>
                    </table>
                </div>
            </div>

            <div id="history" class="page">
                <h3>📜 История</h3>
                <div id="historyList" class="empty-state">Загрузка...</div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://csvynjkhhlexbnwpziup.supabase.co';
        const SUPABASE_KEY = 'sb_publishable__WbXqBZhgBBU-dDFEvXVeA_PQYwa_y7';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let chiefId = localStorage.getItem('chiefId');
        let districtName = localStorage.getItem('chiefDistrictName');
        let districtId = localStorage.getItem('chiefDistrictId');
        let branchType = localStorage.getItem('chiefBranchType');
        let activistName = localStorage.getItem('activistName');

        if (!chiefId) {
            window.location.href = 'index.html';
        }

        const displayName = activistName || districtName || 'Неизвестно';
        document.getElementById('districtDisplay').innerHTML = '📍 ' + displayName + (branchType === 'primary' ? ' • Первичка' : branchType === 'activist' ? ' • Активист' : '');

        let mySubmissionsMap = {};

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr);
            return d.toLocaleDateString('ru-RU');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        async function loadMySubmissions() {
            const { data } = await sb.from('board_submissions').select('board_task_id, link').eq('chief_id', chiefId);
            mySubmissionsMap = {};
            if (data) {
                for (let s of data) {
                    if (!mySubmissionsMap[s.board_task_id]) mySubmissionsMap[s.board_task_id] = [];
                    mySubmissionsMap[s.board_task_id].push(s.link);
                }
            }
        }

        async function updateStats() {
            const { data: boardTasks } = await sb.from('board_tasks').select('id', { count: 'exact' }).eq('is_active', true);
            const totalBoard = boardTasks?.length || 0;
            
            const { data: mySubmissions } = await sb.from('board_submissions').select('id', { count: 'exact' }).eq('chief_id', chiefId);
            const completedBoard = mySubmissions?.length || 0;
            
            const { data: assignments } = await sb.from('assignments').select('status').eq('chief_id', chiefId);
            const totalRaspush = assignments?.length || 0;
            const completedRaspush = assignments?.filter(a => a.status === 'completed').length || 0;
            
            const totalTasks = totalBoard + totalRaspush;
            const completedTasks = completedBoard + completedRaspush;
            
            const { data: scoreData } = await sb.from('chief_scores').select('total_score').eq('chief_id', chiefId).single();
            const totalScore = scoreData?.total_score || 0;
            
            document.getElementById('totalTasks').innerText = totalTasks;
            document.getElementById('completedTasks').innerText = completedTasks;
            document.getElementById('totalScore').innerText = totalScore;
        }

        async function loadBoardTasks() {
            await loadMySubmissions();
            const { data: tasks } = await sb.from('board_tasks').select('*').eq('is_active', true).order('deadline');
            const container = document.getElementById('tasksList');
            if (!tasks?.length) {
                container.innerHTML = '<div class="empty-state">📭 Нет заданий</div>';
                return;
            }

            let html = '';
            for (let task of tasks) {
                const myLinks = mySubmissionsMap[task.id] || [];
                const expired = new Date(task.deadline) < new Date();
                const statusClass = expired ? 'expired' : (myLinks.length ? 'completed' : '');
                const statusText = expired ? '⏰ Просрочено' : (myLinks.length ? '✅ Участвую' : '⏳ Активно');
                
                html += `
                    <div class="task-card" onclick="toggleCard(event, this)">
                        <div class="task-title">${escapeHtml(task.title)}</div>
                        <div class="task-date">📅 До: ${formatDate(task.deadline)}</div>
                        <div><span class="task-status ${statusClass}">${statusText}</span></div>
                        <div class="task-detail">
                            <p><strong>📝 Описание:</strong><br>${escapeHtml(task.description || 'Нет')}</p>
                            <p><strong>📋 ТЗ:</strong><br>${escapeHtml(task.technical_task || 'Нет')}</p>
                            ${myLinks.length ? `<div><strong>✅ Отправлено (${myLinks.length}):</strong><br>${myLinks.map(l => `<a href="${l}" target="_blank" class="sent-link">🔗 ${l.length > 30 ? l.substring(0,30)+'...' : l}</a>`).join('')}</div>` : ''}
                            ${!expired ? `
                                <input type="text" id="link_${task.id}" class="link-input" placeholder="Вставьте ссылку на выполненную работу">
                                <button class="btn-submit" onclick="submitTaskLink(${task.id}, event)">📤 Отправить +1 балл</button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
            updateStats();
        }

        window.toggleCard = (event, el) => {
            if (event.target.tagName === 'INPUT' || event.target.tagName === 'BUTTON') {
                return;
            }
            el.classList.toggle('open');
        };

        window.submitTaskLink = async (taskId, event) => {
            event.stopPropagation();
            const link = document.getElementById(`link_${taskId}`)?.value.trim();
            if (!link) { alert('Вставьте ссылку'); return; }

            const { data: existing } = await sb.from('board_submissions').select('id').eq('board_task_id', taskId).eq('chief_id', chiefId).eq('link', link);
            if (existing?.length) { alert('❌ Эта ссылка уже была отправлена!'); return; }

            await sb.from('board_submissions').insert([{ board_task_id: taskId, chief_id: chiefId, link, district_id: districtId }]);

            const { data: cur } = await sb.from('chief_scores').select('total_score').eq('chief_id', chiefId).single();
            await sb.from('chief_scores').upsert({ chief_id: chiefId, total_score: (cur?.total_score || 0) + 1, updated_at: new Date() });

            const { data: chiefs } = await sb.from('chiefs').select('id').eq('district_id', districtId);
            let total = 0;
            for (let c of chiefs || []) {
                const { data: s } = await sb.from('chief_scores').select('total_score').eq('chief_id', c.id).single();
                total += s?.total_score || 0;
            }
            await sb.from('district_scores').upsert({ district_id: districtId, total_score: total, updated_at: new Date() });

            loadBoardTasks();
            loadRaspush();
            loadHistory();
            loadRating();
            showToast('✅ +1 балл!');
        };

        async function loadRaspush() {
            if (branchType === 'activist') {
                document.getElementById('raspushList').innerHTML = '<div class="empty-state">📭 Активисты не получают распуши</div>';
                return;
            }
            
            const { data: tasks } = await sb.from('assignments').select('*, task_templates(*)').eq('chief_id', chiefId).order('created_at', { ascending: false });
            const container = document.getElementById('raspushList');
            if (!tasks?.length) {
                container.innerHTML = '<div class="empty-state">📭 Нет распушей</div>';
                return;
            }

            const { data: history } = await sb.from('operations_history').select('assignment_id, description').eq('chief_id', chiefId).ilike('action', '%ссылка%');
            const sentMap = {};
            if (history) {
                for (let h of history) {
                    if (!sentMap[h.assignment_id]) sentMap[h.assignment_id] = [];
                    const match = h.description.match(/ссылка: (https?:\/\/[^\s]+)/);
                    if (match) sentMap[h.assignment_id].push(match[1]);
                }
            }

            let html = '';
            for (let task of tasks) {
                const sent = sentMap[task.id] || [];
                const expired = task.deadline && new Date(task.deadline) < new Date();
                const statusText = task.status === 'completed' ? '✅ Выполнено' : (expired ? '⏰ Просрочено' : '⏳ Ожидает');
                const statusClass = task.status === 'completed' ? 'completed' : (expired ? 'expired' : '');
                
                let sentHtml = '';
                if (sent.length) {
                    sentHtml = `
                        <div class="sent-links">
                            <div style="font-size:11px; margin-bottom:4px;">✅ Отправлено (${sent.length}):</div>
                            ${sent.map(l => `<a href="${l}" target="_blank" class="sent-link">🔗 ${l.length > 30 ? l.substring(0,30)+'...' : l}</a>`).join('')}
                        </div>
                    `;
                }

                html += `
                    <div class="raspush-item">
                        <div class="task-title">${escapeHtml(task.title || task.task_templates?.title || 'Задача')}</div>
                        <div style="font-size:12px; opacity:0.7;">${escapeHtml(task.description || task.task_templates?.description || '')}</div>
                        ${task.link ? `<div class="raspush-link"><strong>🔗 Ссылка:</strong><br><a href="${escapeHtml(task.link)}" target="_blank">${escapeHtml(task.link)}</a></div>` : ''}
                        ${task.deadline ? `<div style="font-size:11px; margin:6px 0; color:#f59e0b;">⏰ Срок: ${new Date(task.deadline).toLocaleDateString()}</div>` : ''}
                        ${sentHtml}
                        <div><span class="task-status ${statusClass}">${statusText}</span></div>
                        ${task.status === 'pending' && !expired ? `
                            <input type="text" id="raspush_link_${task.id}" class="link-input" placeholder="Вставьте ссылку (t.me, vk.com, vk.ru)">
                            <button class="btn-submit" onclick="submitRaspushLink(${task.id})">✅ Выполнить +1 балл</button>
                        ` : ''}
                    </div>
                `;
            }
            container.innerHTML = html;
            updateStats();
        }

        window.submitRaspushLink = async (taskId) => {
            const link = document.getElementById(`raspush_link_${taskId}`)?.value.trim();
            if (!link) { alert('Вставьте ссылку'); return; }

            const allowed = ['t.me', 'vk.com', 'vk.ru'];
            if (!allowed.some(d => link.includes(d))) {
                alert('Ссылка должна быть на t.me, vk.com или vk.ru');
                return;
            }

            const { data: dup } = await sb.from('operations_history').select('id').eq('chief_id', chiefId).eq('assignment_id', taskId).ilike('description', `%${link}%`);
            if (dup?.length) { alert('❌ Эта ссылка уже была отправлена!'); return; }

            await sb.from('operations_history').insert([{ chief_id: chiefId, assignment_id: taskId, action: `Отправлена ссылка: ${link}` }]);

            const { data: cur } = await sb.from('chief_scores').select('total_score').eq('chief_id', chiefId).single();
            await sb.from('chief_scores').upsert({ chief_id: chiefId, total_score: (cur?.total_score || 0) + 1, updated_at: new Date() });

            const { data: chiefs } = await sb.from('chiefs').select('id').eq('district_id', districtId);
            let total = 0;
            for (let c of chiefs || []) {
                const { data: s } = await sb.from('chief_scores').select('total_score').eq('chief_id', c.id).single();
                total += s?.total_score || 0;
            }
            await sb.from('district_scores').upsert({ district_id: districtId, total_score: total, updated_at: new Date() });

            document.getElementById(`raspush_link_${taskId}`).value = '';
            loadRaspush();
            loadHistory();
            loadRating();
            showToast('✅ +1 балл!');
        };

        async function loadHistory() {
            const { data } = await sb.from('operations_history').select('*').eq('chief_id', chiefId).order('created_at', { ascending: false }).limit(50);
            const container = document.getElementById('historyList');
            if (!data?.length) { container.innerHTML = '<div class="empty-state">📭 История пуста</div>'; return; }
            let html = '';
            for (let h of data) {
                let action = h.action;
                if (action?.length > 50) action = action.substring(0, 50) + '...';
                html += `<div class="history-item"><span>${escapeHtml(action || 'Действие')}</span><span>${new Date(h.created_at).toLocaleString()}</span></div>`;
            }
            container.innerHTML = html;
        }

        // ========== РЕЙТИНГ - ИСПРАВЛЕН (БЕЗ КИТАЙСКИХ) ==========
        async function loadRating() {
            const { data: districts } = await sb.from('districts').select('id, name');
            const { data: scores } = await sb.from('district_scores').select('district_id, total_score');
            
            const scoreMap = {};
            if (scores) {
                for (let s of scores) {
                    scoreMap[s.district_id] = s.total_score || 0;
                }
            }
            
            let html = '';
            for (let d of districts) {
                const score = scoreMap[d.id] || 0;
                html += `<tr><td style="font-weight:500;">${escapeHtml(d.name)}</td><td style="color:#6c8cff;">${score} баллов</td></tr>`;
            }
            
            document.getElementById('ratingList').innerHTML = html;
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        window.resetAndExit = () => {
            localStorage.clear();
            window.location.href = 'index.html';
        };

        document.querySelectorAll('.menu-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(btn.dataset.page).classList.add('active');
                if (btn.dataset.page === 'rating') loadRating();
                if (btn.dataset.page === 'history') loadHistory();
                if (btn.dataset.page === 'tasks') loadBoardTasks();
                if (btn.dataset.page === 'raspush') loadRaspush();
            };
        });

        loadBoardTasks();
        loadRaspush();
        loadHistory();
        loadRating();
        setInterval(() => {
            loadBoardTasks();
            loadRaspush();
        }, 30000);
    </script>
</body>
</html>
