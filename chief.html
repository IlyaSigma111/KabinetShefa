<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Кабинет шеф-редактора</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0c10;
            color: #fff;
            min-height: 100vh;
        }

        .glow-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .glow-sphere {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.4;
        }

        .sphere-1 {
            width: 600px;
            height: 600px;
            top: -200px;
            right: -200px;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .sphere-2 {
            width: 500px;
            height: 500px;
            bottom: -200px;
            left: -100px;
            background: linear-gradient(135deg, #ff6b6b, #ff8e53);
        }

        .sphere-3 {
            width: 400px;
            height: 400px;
            top: 50%;
            left: 30%;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
        }

        .glass-card {
            background: rgba(20, 25, 35, 0.5);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .logo h2 {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #b0c4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .district-badge {
            background: rgba(108, 140, 255, 0.2);
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            border: 1px solid rgba(108, 140, 255, 0.3);
        }

        .reset-btn {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            padding: 8px 20px;
            border-radius: 40px;
            color: #f87171;
            cursor: pointer;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            border-radius: 24px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-number {
            font-size: 32px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #b0c4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .progress-container {
            margin-bottom: 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 12px;
        }

        .progress-bar {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            height: 8px;
            overflow: hidden;
        }

        .progress-fill {
            background: #3b82f6;
            height: 100%;
            border-radius: 20px;
            transition: width 0.3s;
        }

        .progress-text {
            text-align: center;
            font-size: 11px;
            margin-top: 8px;
            opacity: 0.7;
        }

        .menu-scroll {
            overflow-x: auto;
            margin-bottom: 20px;
            -webkit-overflow-scrolling: touch;
        }

        .menu-items {
            display: flex;
            gap: 10px;
            min-width: min-content;
        }

        .menu-btn {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.4);
            border: none;
            border-radius: 40px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }

        .menu-btn.active {
            background: rgba(108, 140, 255, 0.3);
            border: 1px solid rgba(108, 140, 255, 0.4);
            color: white;
        }

        .content {
            background: rgba(20, 25, 35, 0.4);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 24px;
            min-height: 500px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .page h3 {
            font-size: 20px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* Календарь */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .calendar-nav {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .calendar-nav button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .calendar-day-header {
            text-align: center;
            font-weight: 600;
            padding: 8px;
            font-size: 12px;
            opacity: 0.7;
        }

        .calendar-day {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 8px 4px;
            min-height: 90px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .calendar-day:hover {
            background: rgba(108, 140, 255, 0.15);
            transform: translateY(-2px);
        }

        .calendar-day.other-month {
            opacity: 0.4;
        }

        .calendar-day-number {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 6px;
            text-align: center;
        }

        .calendar-event {
            background: rgba(59, 130, 246, 0.2);
            border-left: 2px solid #3b82f6;
            padding: 3px 4px;
            font-size: 9px;
            margin-top: 2px;
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Квадратные карточки заданий */
        .tasks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }

        .task-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .task-card:hover {
            transform: translateY(-2px);
            background: rgba(108, 140, 255, 0.1);
            border-color: rgba(108, 140, 255, 0.3);
        }

        .task-card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .task-card-date {
            font-size: 11px;
            opacity: 0.6;
            margin-bottom: 8px;
        }

        .task-card-status {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .task-detail {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: none;
        }

        .task-card.expanded .task-detail {
            display: block;
        }

        .task-detail p {
            font-size: 12px;
            line-height: 1.5;
            opacity: 0.8;
            margin-bottom: 12px;
        }

        .task-link {
            color: #6c8cff;
            text-decoration: none;
            font-size: 12px;
            word-break: break-all;
            display: block;
            margin: 8px 0;
        }

        .link-input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: white;
            margin-top: 8px;
        }

        .btn-complete {
            background: rgba(16, 185, 129, 0.2);
            border: none;
            padding: 8px;
            border-radius: 30px;
            color: #10b981;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .sent-links {
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sent-link {
            display: inline-block;
            background: rgba(108, 140, 255, 0.15);
            padding: 3px 8px;
            border-radius: 14px;
            font-size: 10px;
            margin: 2px;
            color: #6c8cff;
            text-decoration: none;
        }

        .history-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 18px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
        }

        .ranking-table th,
        .ranking-table td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 13px;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s;
            padding: 20px;
        }

        .modal-overlay.show {
            visibility: visible;
            opacity: 1;
        }

        .modal {
            background: rgba(20, 25, 35, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
        }

        .modal h3 {
            font-size: 20px;
            margin-bottom: 12px;
        }

        .modal-close {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            padding: 10px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
        }

        .participate-btn {
            background: rgba(16, 185, 129, 0.2);
            border: none;
            padding: 12px;
            border-radius: 40px;
            color: #10b981;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 16px;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 10px 20px;
            border-radius: 40px;
            z-index: 1000;
            border-left: 4px solid #6c8cff;
            font-size: 13px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            .logo h2 {
                font-size: 20px;
            }
            .stat-number {
                font-size: 26px;
            }
            .calendar-grid {
                gap: 4px;
            }
            .calendar-day {
                min-height: 70px;
                padding: 4px 2px;
            }
            .tasks-grid {
                grid-template-columns: 1fr;
            }
            .menu-btn {
                padding: 8px 16px;
                font-size: 13px;
            }
            .content {
                padding: 16px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="glow-bg">
        <div class="glow-sphere sphere-1"></div>
        <div class="glow-sphere sphere-2"></div>
        <div class="glow-sphere sphere-3"></div>
    </div>

    <div class="container">
        <div class="glass-card" style="padding: 20px 24px; margin-bottom: 20px;">
            <div class="header">
                <div class="logo"><h2>📰 Кабинет шеф-редактора</h2></div>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <span class="district-badge" id="districtDisplay">Загрузка...</span>
                    <button class="reset-btn" onclick="resetAndExit()">Сменить</button>
                </div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalTasks">0</div><div>Всего заданий</div></div>
            <div class="stat-card"><div class="stat-number" id="completedTasks">0</div><div>Выполнено</div></div>
            <div class="stat-card"><div class="stat-number" id="totalScore">0</div><div>Баллов</div></div>
        </div>

        <div class="progress-container">
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width: 0%"></div></div>
            <div class="progress-text" id="progressText">Загрузка...</div>
        </div>

        <div class="menu-scroll">
            <div class="menu-items">
                <button class="menu-btn active" data-page="calendar">📅 Календарь</button>
                <button class="menu-btn" data-page="tasks">📋 Задания</button>
                <button class="menu-btn" data-page="rating">🏆 Рейтинг</button>
                <button class="menu-btn" data-page="history">📜 История</button>
            </div>
        </div>

        <div class="content">
            <div id="calendar" class="page active">
                <div class="calendar-header">
                    <h3>📅 Календарь событий</h3>
                    <div class="calendar-nav">
                        <button id="prevMonthBtn">←</button>
                        <span id="currentMonthYear"></span>
                        <button id="nextMonthBtn">→</button>
                    </div>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>

            <div id="tasks" class="page">
                <h3>📋 Задания с доски</h3>
                <div id="tasksList" class="empty-state">Загрузка...</div>
            </div>

            <div id="rating" class="page">
                <h3>🏆 Рейтинг округов</h3>
                <div style="overflow-x: auto;">
                    <table class="ranking-table">
                        <thead><tr><th>Округ</th><th>Баллы</th></tr></thead>
                        <tbody id="ratingList"></tbody>
                    </table>
                </div>
            </div>

            <div id="history" class="page">
                <h3>📜 История</h3>
                <div id="historyList" class="empty-state">Загрузка...</div>
            </div>
        </div>
    </div>

    <div id="eventModal" class="modal-overlay">
        <div class="modal">
            <h3 id="modalTitle"></h3>
            <div id="modalDesc"></div>
            <div id="modalTech" style="background: rgba(0,0,0,0.3); padding: 12px; border-radius: 16px; margin: 12px 0;"></div>
            <div id="modalDeadline"></div>
            <div id="modalStatus"></div>
            <div id="modalParticipate"></div>
            <button class="modal-close" onclick="closeModal()">Закрыть</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://csvynjkhhlexbnwpziup.supabase.co';
        const SUPABASE_KEY = 'sb_publishable__WbXqBZhgBBU-dDFEvXVeA_PQYwa_y7';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let chiefId = localStorage.getItem('chiefId');
        let districtName = localStorage.getItem('chiefDistrictName');
        let branchType = localStorage.getItem('chiefBranchType');
        let districtId = localStorage.getItem('chiefDistrictId');

        let currentDate = new Date();
        let allEvents = [];
        let mySubmissionsMap = {};
        let currentModalEventId = null;

        if (!chiefId) {
            window.location.href = 'index.html';
        }

        document.getElementById('districtDisplay').innerHTML = '📍 ' + (districtName || 'Неизвестно') + (branchType === 'primary' ? ' • Первичка' : '');

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        function formatDateShort(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            return date.toLocaleDateString('ru-RU');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        async function loadEvents() {
            const { data: tasks } = await sb.from('board_tasks').select('*').eq('is_active', true);
            const { data: mySubmissions } = await sb.from('board_submissions').select('board_task_id, link').eq('chief_id', chiefId);

            mySubmissionsMap = {};
            if (mySubmissions) {
                for (let s of mySubmissions) {
                    if (!mySubmissionsMap[s.board_task_id]) mySubmissionsMap[s.board_task_id] = [];
                    mySubmissionsMap[s.board_task_id].push(s.link);
                }
            }
            allEvents = tasks || [];
            renderCalendar();
            updateProgress();
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startOffset = firstDay.getDay() === 0 ? 6 : firstDay.getDay() - 1;
            const daysInMonth = lastDay.getDate();
            const prevMonthLastDay = new Date(year, month, 0).getDate();

            const monthNames = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
            document.getElementById('currentMonthYear').innerText = `${monthNames[month]} ${year}`;

            let grid = '';
            const weekdays = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
            for (let d of weekdays) grid += `<div class="calendar-day-header">${d}</div>`;

            for (let i = 0; i < startOffset; i++) {
                grid += `<div class="calendar-day other-month"><div class="calendar-day-number">${prevMonthLastDay - startOffset + i + 1}</div></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const events = allEvents.filter(e => {
                    const d = new Date(e.deadline);
                    return d.getDate() === day && d.getMonth() === month && d.getFullYear() === year;
                });
                let eventsHtml = '';
                for (let e of events) {
                    const count = mySubmissionsMap[e.id]?.length || 0;
                    eventsHtml += `<div class="calendar-event" onclick="event.stopPropagation(); openEventModal(${e.id})">${escapeHtml(e.title)}${count ? ` (${count})` : ''}</div>`;
                }
                grid += `<div class="calendar-day" onclick="openEventsOnDate('${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}')">
                    <div class="calendar-day-number">${day}</div>
                    ${eventsHtml}
                </div>`;
            }

            const totalCells = 42;
            const filled = startOffset + daysInMonth;
            for (let i = 1; i <= totalCells - filled; i++) {
                grid += `<div class="calendar-day other-month"><div class="calendar-day-number">${i}</div></div>`;
            }

            document.getElementById('calendarGrid').innerHTML = grid;
        }

        window.openEventModal = async (id) => {
            currentModalEventId = id;
            const event = allEvents.find(e => e.id === id);
            if (!event) return;

            const myLinks = mySubmissionsMap[id] || [];
            document.getElementById('modalTitle').innerText = event.title;
            document.getElementById('modalDesc').innerHTML = `<strong>📝 Описание:</strong><br>${escapeHtml(event.description || 'Нет')}`;
            document.getElementById('modalTech').innerHTML = `<strong>📋 ТЗ:</strong><br>${escapeHtml(event.technical_task || 'Нет')}`;
            document.getElementById('modalDeadline').innerHTML = `<strong>⏰ Срок:</strong> ${formatDate(event.deadline)}`;
            document.getElementById('modalStatus').innerHTML = `<strong>📌 Статус:</strong> Отправлено ${myLinks.length} ссылок. Можно отправлять ещё до окончания срока!`;

            let participateHtml = '';
            if (new Date(event.deadline) > new Date()) {
                participateHtml = `
                    <div style="margin-top: 16px;">
                        <div style="background: rgba(108,140,255,0.1); padding: 10px; border-radius: 14px; margin-bottom: 10px; font-size: 12px;">📌 Каждая ссылка = +1 балл. Можно отправить несколько!</div>
                        <input type="text" id="modalLinkInput" class="participate-input" placeholder="Вставьте ссылку (Google Drive, Яндекс Диск, ВК)" style="width:100%; padding:10px; background:rgba(0,0,0,0.3); border:1px solid rgba(255,255,255,0.1); border-radius:20px;">
                        <button class="participate-btn" onclick="submitModalLink()">📤 Отправить ссылку +1 балл</button>
                    </div>
                `;
            } else {
                participateHtml = `<div style="margin-top: 16px; padding: 12px; background: rgba(239,68,68,0.2); border-radius: 20px; text-align: center;">⏰ Срок истёк</div>`;
            }
            document.getElementById('modalParticipate').innerHTML = participateHtml;
            document.getElementById('eventModal').classList.add('show');
        };

        window.submitModalLink = async () => {
            const link = document.getElementById('modalLinkInput')?.value.trim();
            if (!link) { alert('Вставьте ссылку'); return; }

            const { data: existing } = await sb.from('board_submissions').select('id').eq('board_task_id', currentModalEventId).eq('chief_id', chiefId).eq('link', link);
            if (existing?.length) { alert('❌ Эта ссылка уже была отправлена!'); return; }

            await sb.from('board_submissions').insert([{ board_task_id: currentModalEventId, chief_id: chiefId, link, district_id: districtId }]);

            const { data: cur } = await sb.from('chief_scores').select('total_score').eq('chief_id', chiefId).single();
            await sb.from('chief_scores').upsert({ chief_id: chiefId, total_score: (cur?.total_score || 0) + 1, updated_at: new Date() });

            const { data: chiefs } = await sb.from('chiefs').select('id').eq('district_id', districtId);
            let total = 0;
            for (let c of chiefs || []) {
                const { data: s } = await sb.from('chief_scores').select('total_score').eq('chief_id', c.id).single();
                total += s?.total_score || 0;
            }
            await sb.from('district_scores').upsert({ district_id: districtId, total_score: total, updated_at: new Date() });

            closeModal();
            loadEvents();
            loadTasks();
            loadHistory();
            loadRating();
            showToast('✅ +1 балл!');
        };

        window.openEventsOnDate = (dateStr) => {
            const events = allEvents.filter(e => new Date(e.deadline).toDateString() === new Date(dateStr).toDateString());
            if (!events.length) { alert('На эту дату нет мероприятий'); return; }

            let modalContent = '<div style="max-height: 400px; overflow-y: auto;">';
            for (let e of events) {
                const count = mySubmissionsMap[e.id]?.length || 0;
                modalContent += `
                    <div style="border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 12px; margin-bottom: 12px;">
                        <strong>${escapeHtml(e.title)}</strong><br>
                        <span style="font-size: 11px;">📅 ${formatDateShort(e.deadline)}</span><br>
                        <span>📤 Отправлено: ${count}</span>
                        <button onclick="closeModal(); setTimeout(() => openEventModal(${e.id}), 100)" style="margin-top: 8px; padding: 6px 12px; background: #3b82f6; border: none; border-radius: 20px; color: white; cursor: pointer;">Подробнее</button>
                    </div>
                `;
            }
            modalContent += '</div>';

            document.getElementById('modalTitle').innerText = `События на ${formatDateShort(dateStr)}`;
            document.getElementById('modalDesc').innerHTML = modalContent;
            document.getElementById('modalTech').innerHTML = '';
            document.getElementById('modalDeadline').innerHTML = '';
            document.getElementById('modalStatus').innerHTML = '';
            document.getElementById('modalParticipate').innerHTML = '';
            document.getElementById('eventModal').classList.add('show');
        };

        function closeModal() {
            document.getElementById('eventModal').classList.remove('show');
        }

        async function updateProgress() {
            const { data: chiefs } = await sb.from('chiefs').select('id').eq('district_id', districtId);
            const { data: myScore } = await sb.from('chief_scores').select('total_score').eq('chief_id', chiefId).single();

            let total = 0;
            for (let c of chiefs || []) {
                const { data: s } = await sb.from('chief_scores').select('total_score').eq('chief_id', c.id).single();
                total += s?.total_score || 0;
            }
            const avg = chiefs?.length ? total / chiefs.length : 0;
            const percent = avg > 0 ? Math.min(100, Math.round((myScore?.total_score || 0) / avg * 100)) : 0;

            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('progressText').innerHTML = `${percent}% от среднего по округу (средний: ${Math.round(avg)} баллов)`;
        }

        async function loadTasks() {
            const { data: tasks } = await sb.from('board_tasks').select('*').eq('is_active', true).order('deadline');
            const container = document.getElementById('tasksList');
            if (!tasks?.length) { container.innerHTML = '<div class="empty-state">📭 Нет заданий</div>'; return; }

            let html = '<div class="tasks-grid">';
            for (let task of tasks) {
                const myLinks = mySubmissionsMap[task.id] || [];
                const expired = new Date(task.deadline) < new Date();
                html += `
                    <div class="task-card" onclick="toggleTaskCard(this)">
                        <div class="task-card-title">${escapeHtml(task.title)}</div>
                        <div class="task-card-date">📅 ${formatDateShort(task.deadline)}</div>
                        <div><span class="task-card-status">${expired ? '⏰ Просрочено' : '⏳ Активно'}</span></div>
                        <div class="task-detail">
                            <p><strong>📝 Описание:</strong><br>${escapeHtml(task.description || 'Нет')}</p>
                            <p><strong>📋 ТЗ:</strong><br>${escapeHtml(task.technical_task || 'Нет')}</p>
                            ${myLinks.length ? `<div><strong>✅ Отправлено (${myLinks.length}):</strong><br>${myLinks.map(l => `<a href="${l}" target="_blank" class="sent-link">🔗 ${l.length > 30 ? l.substring(0,30)+'...' : l}</a>`).join('')}</div>` : ''}
                            ${!expired ? `
                                <input type="text" id="task_link_${task.id}" class="link-input" placeholder="Вставьте ссылку на выполненную работу">
                                <button class="btn-complete" onclick="event.stopPropagation(); submitTaskLink(${task.id})">📤 Отправить ссылку +1 балл</button>
                            ` : ''}
                        </div>
                    </div>
                `;
            }
            html += '</div>';
            container.innerHTML = html;
        }

        window.toggleTaskCard = (el) => {
            el.classList.toggle('expanded');
        };

        window.submitTaskLink = async (taskId) => {
            const link = document.getElementById(`task_link_${taskId}`)?.value.trim();
            if (!link) { alert('Вставьте ссылку'); return; }

            const { data: existing } = await sb.from('board_submissions').select('id').eq('board_task_id', taskId).eq('chief_id', chiefId).eq('link', link);
            if (existing?.length) { alert('❌ Эта ссылка уже была отправлена!'); return; }

            await sb.from('board_submissions').insert([{ board_task_id: taskId, chief_id: chiefId, link, district_id: districtId }]);

            const { data: cur } = await sb.from('chief_scores').select('total_score').eq('chief_id', chiefId).single();
            await sb.from('chief_scores').upsert({ chief_id: chiefId, total_score: (cur?.total_score || 0) + 1, updated_at: new Date() });

            const { data: chiefs } = await sb.from('chiefs').select('id').eq('district_id', districtId);
            let total = 0;
            for (let c of chiefs || []) {
                const { data: s } = await sb.from('chief_scores').select('total_score').eq('chief_id', c.id).single();
                total += s?.total_score || 0;
            }
            await sb.from('district_scores').upsert({ district_id: districtId, total_score: total, updated_at: new Date() });

            loadTasks();
            loadEvents();
            loadHistory();
            loadRating();
            showToast('✅ +1 балл!');
        };

        async function loadHistory() {
            const { data } = await sb.from('operations_history').select('*').eq('chief_id', chiefId).order('created_at', { ascending: false }).limit(50);
            const container = document.getElementById('historyList');
            if (!data?.length) { container.innerHTML = '<div class="empty-state">📭 История пуста</div>'; return; }
            let html = '';
            for (let h of data) {
                let action = h.action;
                if (action?.length > 55) action = action.substring(0, 55) + '...';
                html += `<div class="history-item"><span>${escapeHtml(action || 'Действие')}</span><span style="opacity:0.5;">${new Date(h.created_at).toLocaleString()}</span></div>`;
            }
            container.innerHTML = html;
        }

        async function loadRating() {
            const { data } = await sb.from('district_scores').select('*, districts(name)').order('total_score', { ascending: false });
            const container = document.getElementById('ratingList');
            if (!data?.length) { container.innerHTML = '发展<td colspan="2" class="empty-state">Нет данных<\/td><\/tr>'; return; }
            let html = '';
            for (let d of data) {
                if (!d.districts?.name) continue;
                html += `发展<td style="font-weight:500;">${escapeHtml(d.districts.name)}<\/td><td style="color:#6c8cff;">${d.total_score} баллов<\/td><\/tr>`;
            }
            container.innerHTML = html;
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }

        window.resetAndExit = () => {
            localStorage.clear();
            window.location.href = 'index.html';
        };

        document.getElementById('prevMonthBtn').onclick = () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        };
        document.getElementById('nextMonthBtn').onclick = () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        };

        document.querySelectorAll('.menu-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(btn.dataset.page).classList.add('active');
                if (btn.dataset.page === 'rating') loadRating();
                if (btn.dataset.page === 'history') loadHistory();
                if (btn.dataset.page === 'tasks') loadTasks();
                if (btn.dataset.page === 'calendar') loadEvents();
            };
        });

        loadEvents();
        loadTasks();
        loadHistory();
        loadRating();
        setInterval(loadEvents, 30000);
        setInterval(loadTasks, 30000);
    </script>
</body>
</html>
