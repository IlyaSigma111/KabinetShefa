<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Кабинет шеф-редактора</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f7fa;
            color: #1a202c;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 20px 24px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo h2 {
            font-size: 22px;
            font-weight: 700;
            color: #1a202c;
        }

        .district-badge {
            background: #e2e8f0;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 13px;
            color: #1a202c;
        }

        .reset-btn {
            background: #fee2e2;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: #dc2626;
            font-size: 13px;
            cursor: pointer;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            padding: 16px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 800;
            color: #3b82f6;
        }

        .stat-label {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }

        .menu-scroll {
            overflow-x: auto;
            margin-bottom: 20px;
        }

        .menu-items {
            display: flex;
            gap: 10px;
        }

        .menu-btn {
            padding: 10px 20px;
            background: #f1f5f9;
            border: none;
            border-radius: 40px;
            color: #475569;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }

        .menu-btn.active {
            background: #3b82f6;
            color: white;
        }

        .content {
            background: white;
            border-radius: 24px;
            padding: 24px;
            min-height: 500px;
            border: 1px solid #e2e8f0;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .page h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        /* Доска объявлений */
        .board-item {
            background: #f8fafc;
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
        }

        .board-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .board-date {
            font-size: 11px;
            margin: 6px 0;
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
            background: #fef3c7;
            color: #d97706;
        }

        .board-desc {
            font-size: 13px;
            color: #64748b;
            margin: 8px 0;
        }

        .board-tech {
            background: #f1f5f9;
            padding: 10px;
            border-radius: 16px;
            margin: 10px 0;
            font-size: 12px;
            border-left: 3px solid #3b82f6;
        }

        .participate-btn {
            background: #dcfce7;
            border: none;
            padding: 8px;
            border-radius: 40px;
            color: #16a34a;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        .already-participating {
            background: #e0e7ff;
            padding: 8px;
            border-radius: 40px;
            text-align: center;
            font-size: 12px;
            color: #4f46e5;
        }

        /* Задачи */
        .task-item {
            background: #f8fafc;
            padding: 16px;
            border-radius: 20px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
        }

        .task-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .task-desc {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 8px;
        }

        .coordinator-link {
            background: #e0e7ff;
            padding: 10px 12px;
            border-radius: 16px;
            margin: 10px 0;
            word-break: break-all;
            border-left: 3px solid #4f46e5;
        }

        .coordinator-link a {
            color: #4f46e5;
            text-decoration: none;
        }

        .coordinator-link a:hover {
            text-decoration: underline;
        }

        .deadline {
            font-size: 11px;
            margin: 6px 0;
            padding: 3px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .deadline-normal {
            background: #fef3c7;
            color: #d97706;
        }

        .deadline-urgent {
            background: #fee2e2;
            color: #dc2626;
        }

        .comment {
            font-size: 12px;
            color: #4f46e5;
            margin: 8px 0;
            padding: 8px 10px;
            background: #eff6ff;
            border-radius: 12px;
        }

        .task-status {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            margin-top: 8px;
        }

        .status-pending {
            background: #fef3c7;
            color: #d97706;
        }

        .status-completed {
            background: #dcfce7;
            color: #16a34a;
        }

        .status-expired {
            background: #fee2e2;
            color: #dc2626;
        }

        .btn-complete {
            background: #dcfce7;
            border: none;
            padding: 10px;
            border-radius: 40px;
            color: #16a34a;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
        }

        .link-input {
            width: 100%;
            padding: 10px 12px;
            background: #f1f5f9;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            margin-top: 10px;
        }

        .sent-links {
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid #e2e8f0;
        }

        .sent-link {
            display: inline-block;
            background: #e0e7ff;
            padding: 4px 8px;
            border-radius: 16px;
            font-size: 11px;
            margin: 2px;
            color: #4f46e5;
            text-decoration: none;
        }

        .history-item {
            background: #f8fafc;
            padding: 10px 14px;
            border-radius: 16px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            border: 1px solid #e2e8f0;
        }

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
        }

        .ranking-table th,
        .ranking-table td {
            padding: 10px 6px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
            font-size: 13px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #64748b;
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }
            .stat-number {
                font-size: 24px;
            }
            .content {
                padding: 16px;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo"><h2>📰 Кабинет шеф-редактора</h2></div>
                <div style="display: flex; gap: 10px;">
                    <span class="district-badge" id="districtDisplay">Загрузка...</span>
                    <button class="reset-btn" onclick="resetAndExit()">Сменить</button>
                </div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card"><div class="stat-number" id="totalTasks">0</div><div class="stat-label">Всего задач</div></div>
            <div class="stat-card"><div class="stat-number" id="completedTasks">0</div><div class="stat-label">Выполнено</div></div>
            <div class="stat-card"><div class="stat-number" id="totalScore">0</div><div class="stat-label">Баллов</div></div>
        </div>

        <div class="menu-scroll">
            <div class="menu-items">
                <button class="menu-btn" data-page="board">📢 Доска</button>
                <button class="menu-btn active" data-page="tasks">📋 Задачи</button>
                <button class="menu-btn" data-page="rating">🏆 Рейтинг</button>
                <button class="menu-btn" data-page="history">📜 История</button>
            </div>
        </div>

        <div class="content">
            <div id="board" class="page">
                <h3>📢 Доска объявлений</h3>
                <div id="boardList" class="empty-state">⏳ Загрузка...</div>
            </div>

            <div id="tasks" class="page active">
                <h3>📋 Мои задачи</h3>
                <div id="tasksList" class="empty-state">⏳ Загрузка...</div>
            </div>

            <div id="rating" class="page">
                <h3>🏆 Рейтинг округов</h3>
                <div style="overflow-x: auto;">
                    <table class="ranking-table">
                        <thead>   </thead>
                        <tbody id="ratingList"></tbody>
                     </div>
            </div>

            <div id="history" class="page">
                <h3>📜 История</h3>
                <div id="historyList" class="empty-state">⏳ Загрузка...</div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://csvynjkhhlexbnwpziup.supabase.co';
        const SUPABASE_KEY = 'sb_publishable__WbXqBZhgBBU-dDFEvXVeA_PQYwa_y7';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let chiefId = localStorage.getItem('chiefId');
        let districtName = localStorage.getItem('chiefDistrictName');
        let branchType = localStorage.getItem('chiefBranchType');
        let districtId = localStorage.getItem('chiefDistrictId');
        
        if (!chiefId) {
            document.getElementById('tasksList').innerHTML = '<div class="empty-state">⚠️ Ошибка. <a href="index.html">На главную</a></div>';
            document.getElementById('districtDisplay').innerHTML = 'Ошибка';
        } else {
            document.getElementById('districtDisplay').innerHTML = '📍 ' + (districtName || 'Неизвестно') + (branchType === 'primary' ? ' • Первичка' : '');
        }
        
        function isExpired(deadline) {
            if (!deadline) return false;
            return new Date(deadline) < new Date();
        }
        
        async function loadBoard() {
            try {
                const { data: tasks } = await sb.from('board_tasks').select('*').eq('is_active', true).order('deadline');
                const { data: parts } = await sb.from('board_participants').select('board_task_id').eq('chief_id', chiefId);
                const mySet = new Set(parts?.map(p => p.board_task_id) || []);
                const container = document.getElementById('boardList');
                if (!tasks || tasks.length === 0) {
                    container.innerHTML = '<div class="empty-state">📢 Нет заданий</div>';
                    return;
                }
                let html = '';
                for (let task of tasks) {
                    const expired = isExpired(task.deadline);
                    html += `<div class="board-item"><div class="board-title">${task.title}</div><div class="board-date">📅 До: ${new Date(task.deadline).toLocaleString()}</div><div class="board-desc">${task.description || ''}</div><div class="board-tech"><strong>📋 ТЗ:</strong><br>${task.technical_task || '-'}</div>`;
                    if (mySet.has(task.id)) {
                        html += `<div class="already-participating">✅ Вы участвуете</div>`;
                    } else if (!expired) {
                        html += `<button class="participate-btn" onclick="participate(${task.id})">🎯 Участвовать</button>`;
                    } else {
                        html += `<div class="already-participating" style="background:#fee2e2; color:#dc2626;">⏰ Срок истёк</div>`;
                    }
                    html += `</div>`;
                }
                container.innerHTML = html;
            } catch (err) {
                console.error(err);
            }
        }
        
        window.participate = async (id) => {
            try {
                const { data: task } = await sb.from('board_tasks').select('*').eq('id', id).single();
                await sb.from('board_participants').insert([{ board_task_id: id, chief_id: chiefId, district_id: districtId }]);
                await sb.from('assignments').insert([{
                    template_id: 2,
                    title: task.title,
                    description: task.description,
                    chief_id: chiefId,
                    district_id: districtId,
                    coordinator_comment: task.technical_task,
                    deadline: task.deadline,
                    status: 'pending',
                    type: 'event'
                }]);
                showToast('✅ Вы участвуете!');
                loadBoard();
                loadTasks();
            } catch (err) {
                alert('Ошибка: ' + err.message);
            }
        };
        
        async function loadTasks() {
            try {
                const { data: tasks, error } = await sb
                    .from('assignments')
                    .select('*, task_templates(*)')
                    .eq('chief_id', chiefId)
                    .order('created_at', { ascending: false });
                
                if (error) throw error;
                
                const container = document.getElementById('tasksList');
                if (!tasks || tasks.length === 0) {
                    container.innerHTML = '<div class="empty-state">📭 Нет задач</div>';
                    return;
                }
                
                const { data: history } = await sb
                    .from('operations_history')
                    .select('assignment_id, description')
                    .eq('chief_id', chiefId)
                    .ilike('action', '%ссылка%');
                
                const sentMap = {};
                if (history) {
                    for (let h of history) {
                        if (!sentMap[h.assignment_id]) sentMap[h.assignment_id] = [];
                        const match = h.description.match(/ссылка: (https?:\/\/[^\s]+)/);
                        if (match) sentMap[h.assignment_id].push(match[1]);
                    }
                }
                
                let html = '';
                for (let task of tasks) {
                    const expired = isExpired(task.deadline);
                    const sent = sentMap[task.id] || [];
                    
                    // ========== ИСПРАВЛЕНИЕ: раздельные ссылки ==========
                    let coordinatorLinksHtml = '';
                    if (task.link) {
                        const links = task.link.split(',').map(l => l.trim());
                        coordinatorLinksHtml = `
                            <div class="coordinator-link">
                                <strong>🔗 Ссылки для распуша:</strong>
                                <div style="margin-top: 8px;">
                                    ${links.map(l => `<div style="margin-bottom: 6px;"><a href="${l}" target="_blank" style="color: #4f46e5; word-break: break-all;">${l}</a></div>`).join('')}
                                </div>
                            </div>
                        `;
                    }
                    
                    let deadlineHtml = '';
                    if (task.deadline) {
                        deadlineHtml = `<div class="deadline ${expired ? 'deadline-urgent' : 'deadline-normal'}">⏰ Срок: ${new Date(task.deadline).toLocaleString()}${expired ? ' (просрочено!)' : ''}</div>`;
                    }
                    
                    let commentHtml = '';
                    if (task.coordinator_comment) {
                        commentHtml = `<div class="comment">💬 ${task.coordinator_comment}</div>`;
                    }
                    
                    let sentHtml = '';
                    if (sent.length > 0) {
                        sentHtml = `
                            <div class="sent-links">
                                <div style="font-size: 11px; margin-bottom: 6px;">✅ Отправлено (${sent.length}):</div>
                                <div>${sent.map(l => `<a href="${l}" target="_blank" class="sent-link">🔗 ${l.length > 35 ? l.substring(0,35)+'...' : l}</a>`).join('')}</div>
                            </div>
                        `;
                    }
                    
                    let statusText = '';
                    let statusClass = '';
                    if (task.status === 'completed') {
                        statusText = '✅ Выполнено';
                        statusClass = 'status-completed';
                    } else if (expired) {
                        statusText = '⏰ Просрочено';
                        statusClass = 'status-expired';
                    } else {
                        statusText = '⏳ Ожидает';
                        statusClass = 'status-pending';
                    }
                    
                    html += `
                        <div class="task-item">
                            <div class="task-title">${task.task_templates?.title || 'Задача'}</div>
                            <div class="task-desc">${task.task_templates?.description || ''}</div>
                            ${coordinatorLinksHtml}
                            ${deadlineHtml}
                            ${commentHtml}
                            ${sentHtml}
                            <div><span class="task-status ${statusClass}">${statusText}</span></div>
                    `;
                    
                    if (task.status === 'pending' && !expired) {
                        html += `
                            <input type="text" id="link_${task.id}" class="link-input" placeholder="Вставьте ссылку (t.me, vk.com, vk.ru)">
                            <button class="btn-complete" onclick="sendLink(${task.id})">✅ Выполнить +1 балл</button>
                        `;
                    }
                    html += `</div>`;
                }
                container.innerHTML = html;
                
                const { data: stats } = await sb.from('assignments').select('status').eq('chief_id', chiefId);
                const { data: score } = await sb.from('chief_scores').select('total_score').eq('chief_id', chiefId).single();
                document.getElementById('totalTasks').innerText = stats?.length || 0;
                document.getElementById('completedTasks').innerText = stats?.filter(t => t.status === 'completed').length || 0;
                document.getElementById('totalScore').innerText = score?.total_score || 0;
            } catch (err) {
                console.error(err);
                document.getElementById('tasksList').innerHTML = '<div class="empty-state">❌ Ошибка: ' + err.message + '</div>';
            }
        }
        
        window.sendLink = async function(taskId) {
            const link = document.getElementById(`link_${taskId}`)?.value.trim();
            if (!link) {
                alert('Вставьте ссылку');
                return;
            }
            
            const allowedDomains = ['t.me', 'vk.com', 'vk.ru'];
            let isValid = false;
            for (let domain of allowedDomains) {
                if (link.includes(domain)) {
                    isValid = true;
                    break;
                }
            }
            
            if (!isValid) {
                alert('Ссылка должна быть на t.me, vk.com или vk.ru');
                return;
            }
            
            const { data: dup } = await sb
                .from('operations_history')
                .select('id')
                .eq('chief_id', chiefId)
                .eq('assignment_id', taskId)
                .ilike('description', `%${link}%`);
            
            if (dup && dup.length > 0) {
                alert('❌ Эта ссылка уже была отправлена!');
                return;
            }
            
            try {
                await sb.from('operations_history').insert([{ 
                    chief_id: chiefId, 
                    assignment_id: taskId, 
                    action: `Отправлена ссылка: ${link}` 
                }]);
                
                const { data: cur } = await sb.from('chief_scores').select('total_score').eq('chief_id', chiefId).single();
                await sb.from('chief_scores').upsert({ 
                    chief_id: chiefId, 
                    total_score: (cur?.total_score || 0) + 1, 
                    updated_at: new Date() 
                });
                
                const { data: chiefs } = await sb.from('chiefs').select('id').eq('district_id', districtId);
                let total = 0;
                for (let c of chiefs || []) {
                    const { data: s } = await sb.from('chief_scores').select('total_score').eq('chief_id', c.id).single();
                    total += s?.total_score || 0;
                }
                await sb.from('district_scores').upsert({ 
                    district_id: districtId, 
                    total_score: total, 
                    updated_at: new Date() 
                });
                
                document.getElementById(`link_${taskId}`).value = '';
                loadTasks();
                loadHistory();
                loadRating();
                showToast('✅ +1 балл!');
            } catch (err) {
                alert('Ошибка: ' + err.message);
            }
        };
        
        async function loadHistory() {
            try {
                const { data } = await sb.from('operations_history').select('*').eq('chief_id', chiefId).order('created_at', { ascending: false }).limit(50);
                const container = document.getElementById('historyList');
                if (!data || data.length === 0) {
                    container.innerHTML = '<div class="empty-state">📭 История пуста</div>';
                    return;
                }
                let html = '';
                for (let h of data) {
                    let action = h.action.length > 55 ? h.action.substring(0,55)+'...' : h.action;
                    html += `<div class="history-item"><span>${action}</span><span style="color:#64748b;">${new Date(h.created_at).toLocaleString()}</span></div>`;
                }
                container.innerHTML = html;
            } catch (err) {
                console.error(err);
            }
        }
        
        async function loadRating() {
            try {
                const { data } = await sb.from('district_scores').select('*, districts(name)').order('total_score', { ascending: false });
                const container = document.getElementById('ratingList');
                if (!data || data.length === 0) {
                    container.innerHTML = '发展<td colspan="2" class="empty-state">Нет данных<\/td><\/tr>';
                    return;
                }
                let html = '';
                for (let d of data) {
                    html += `发展<td style="font-weight:500;">${d.districts?.name || 'Неизвестно'}<\/td><td style="color:#3b82f6;">${d.total_score} баллов<\/td><\/tr>`;
                }
                container.innerHTML = html;
            } catch (err) {
                console.error(err);
            }
        }
        
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
        
        window.resetAndExit = function() {
            localStorage.clear();
            window.location.href = 'index.html';
        };
        
        document.querySelectorAll('.menu-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById(btn.dataset.page).classList.add('active');
                if (btn.dataset.page === 'board') loadBoard();
                if (btn.dataset.page === 'rating') loadRating();
                if (btn.dataset.page === 'history') loadHistory();
            };
        });
        
        if (chiefId) {
            loadBoard();
            loadTasks();
            loadHistory();
            loadRating();
            setInterval(loadTasks, 30000);
        }
    </script>
</body>
</html>
